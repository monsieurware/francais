function parseGameRoute() {
  const params = new URLSearchParams(window.location.search);
  const mode = params.get('mode');
  const classCode = params.get('class') || '';
  if (mode === 'game-teacher' || mode === 'game-student') {
    return { mode, classCode };
  }
  return null;
}

async function getFirestoreApi() {
  return await import("https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js");
}

// ---------------- Shared game timer ----------------
// One global timer, mounted to <body>, can be shown/hidden and updated.
let _timerEl = null;
let _timerRAF = null;
let _timerOnExpire = null;
function ensureTimerEl() {
  if (_timerEl) return _timerEl;
  _timerEl = document.createElement('div');
  _timerEl.className = 'game-timer';
  _timerEl.style.display = 'none';
  _timerEl.innerHTML = '<span class="clock-num">--</span><span class="clock-unit">s</span>';
  document.body.appendChild(_timerEl);
  return _timerEl;
}
function showTimer(startedAtMs, totalSeconds, onExpire) {
  const el = ensureTimerEl();
  el.style.display = 'flex';
  _timerOnExpire = onExpire || null;
  if (_timerRAF) cancelAnimationFrame(_timerRAF);
  let expired = false;
  function tick() {
    if (!startedAtMs) {
      // No timestamp yet (serverTimestamp pending). Show "--"
      el.querySelector('.clock-num').textContent = '--';
      el.classList.remove('warn', 'urgent', 'done');
      _timerRAF = requestAnimationFrame(tick);
      return;
    }
    const elapsed = (Date.now() - startedAtMs) / 1000;
    const remaining = Math.max(0, totalSeconds - elapsed);
    const display = Math.ceil(remaining);
    el.querySelector('.clock-num').textContent = display;
    el.classList.toggle('warn', remaining <= 30 && remaining > 15);
    el.classList.toggle('urgent', remaining <= 15 && remaining > 0);
    el.classList.toggle('done', remaining <= 0);
    if (remaining <= 0 && !expired) {
      expired = true;
      if (_timerOnExpire) {
        try { _timerOnExpire(); } catch (e) { console.warn(e); }
      }
    }
    if (remaining > 0) _timerRAF = requestAnimationFrame(tick);
  }
  tick();
}
function hideTimer() {
  if (_timerEl) _timerEl.style.display = 'none';
  if (_timerRAF) { cancelAnimationFrame(_timerRAF); _timerRAF = null; }
  _timerOnExpire = null;
}
function tsToMs(serverTs) {
  // Firestore Timestamp → ms (handles both Timestamp objects and nulls)
  if (!serverTs) return null;
  if (typeof serverTs.toMillis === 'function') return serverTs.toMillis();
  if (typeof serverTs === 'number') return serverTs;
  return null;
}

// ---------------- TEACHER VIEW ----------------
async function renderTeacherView(shell, classCode) {
  shell.innerHTML = `
    <p class="game-eyebrow">Mode jeu · enseignant</p>
    <h1>Jeu de dessin collaboratif</h1>
    <p style="color:var(--muted)">Classe : <b>${classCode || '(aucune)'}</b></p>
    <div class="game-panel">
      <h3 style="margin-top:0">1. Choisis les phrases</h3>
      <p style="color:var(--muted); font-size:0.9rem">Sélectionne une histoire, puis coche les phrases que les élèves vont dessiner. Évite les phrases abstraites.</p>

        ${STORIES.map(s => `<option value="${s.id}">${s.title}</option>`).join('')}

      <div id="sentence-picker" style="max-height:320px; overflow-y:auto; border:1px solid var(--border); border-radius:8px; padding:14px; background:var(--surface); display:none"></div>
    </div>
    <div class="game-panel" id="control-panel" style="display:none">
      <h3 style="margin-top:0">2. Réglages du jeu</h3>
      <div style="display:flex; gap:18px; flex-wrap:wrap; margin-bottom:18px">
        <label style="display:flex; flex-direction:column; gap:4px; font-size:0.85rem; color:var(--muted)">
          Durée du dessin
          <select id="draw-seconds" style="padding:8px 12px; border-radius:6px; border:1px solid var(--border-strong); font-size:0.95rem; color:var(--text)">
            <option value="0">Illimité</option>
            <option value="30">30 secondes</option>
            <option value="60" selected>60 secondes</option>
            <option value="90">90 secondes</option>
            <option value="120">2 minutes</option>
          </select>
        </label>
        <label style="display:flex; flex-direction:column; gap:4px; font-size:0.85rem; color:var(--muted)">
          Mode de vote
          <select id="vote-mode" style="padding:8px 12px; border-radius:6px; border:1px solid var(--border-strong); font-size:0.95rem; color:var(--text)">
            <option value="top3" selected>Top 3 (chacun choisit ses 3 préférés)</option>
            <option value="spam">Spam 20s (taper le plus possible)</option>
          </select>
        </label>
        <label style="display:flex; flex-direction:column; gap:4px; font-size:0.85rem; color:var(--muted)">
          Sentence Jam ⚡
          <select id="jam-enabled" style="padding:8px 12px; border-radius:6px; border:1px solid var(--border-strong); font-size:0.95rem; color:var(--text)">
            <option value="1" selected>Activé (30s après résultats)</option>
            <option value="0">Désactivé</option>
          </select>
        </label>
      </div>
      <h3>3. Contrôles du jeu</h3>
      <div class="game-phase-badge" id="phase-badge">Prêt</div>
      <div class="game-banner-sentence" id="current-sentence">— Aucune phrase active —</div>
      <div class="game-stats">
        <div class="game-stat"><div class="num" id="stat-submitted">0</div><div class="label">Dessins reçus</div></div>
        <div class="game-stat"><div class="num" id="stat-idx">0 / 0</div><div class="label">Phrase</div></div>
      </div>
      <div class="game-controls">
        <button class="btn btn-primary" id="btn-start">Lancer le jeu</button>
        <button class="btn btn-secondary" id="btn-next" disabled>Phrase suivante</button>
        <button class="btn btn-secondary" id="btn-vote" disabled>Ouvrir le vote</button>
        <button class="btn btn-secondary" id="btn-results" disabled>Voir les résultats</button>
        <button class="btn btn-secondary" id="btn-jam" disabled style="background:#d4a574; color:white; border-color:#d4a574">⚡ Lancer Sentence Jam</button>
        <button class="btn btn-secondary" id="btn-add-story" disabled>+ Ajouter une histoire</button>
        <button class="btn btn-secondary" id="btn-mode-toggle">👁 Phrase visible</button>
        <button class="btn btn-ghost" id="btn-end" disabled>Fin du jeu</button>
      </div>
      <div class="add-story-panel" id="add-story-panel">

        <select id="add-story-pick">
          <option value="">— Choisir une histoire —</option>
          ${STORIES.map(s => `<option value="${s.id}">${s.title}</option>`).join('')}
        </select>
        <div class="add-picker" id="add-sentence-picker"></div>
        <div style="display:flex; gap:10px; margin-top:12px">
          <button class="btn btn-primary" id="btn-confirm-add" disabled>Ajouter à la partie</button>
          <button class="btn btn-ghost" id="btn-cancel-add">Annuler</button>
        </div>
      </div>
      <div class="music-widget" id="music-widget" style="margin-top:14px">
        <button class="mw-play" id="mw-play" title="Lecture / pause">▶</button>
        <span class="mw-label" id="mw-label">Musique de fond</span>
        <div class="mw-vol-wrap">
          <span class="mw-vol-icon">🔈</span>
          <input type="range" id="mw-vol" min="0" max="100" value="40">
          <span class="mw-vol-icon">🔊</span>
        </div>
        <span class="mw-time" id="mw-time">0:00</span>
      </div>
      <audio id="bg-music" src="https://audio.jukehost.co.uk/019e1ca5-d6e3-70e1-b49a-598df8fbbdc0" loop preload="none"></audio>
      <div class="attendance-panel" id="attendance-panel">
        <h4>Élèves connectés</h4>
        <div class="attendance-list" id="attendance-list">
          <span class="attendance-empty">Personne n'a encore rejoint la partie.</span>
        </div>
      </div>
      <div class="game-link-box" id="student-link">Le lien élève apparaîtra ici quand le jeu sera lancé.</div>
    </div>
    <div id="teacher-gallery"></div>
  `;

  let selectedSentences = [];

  // Story pick
  shell.querySelector('#story-pick').addEventListener('change', e => {
    const sid = e.target.value;
    const picker = shell.querySelector('#sentence-picker');
    if (!sid) { picker.style.display = 'none'; return; }
    const story = STORIES.find(s => s.id === sid);
    if (!story) return;
    // Flatten all paragraph sentences, excluding chapter headings and dialogue-only lines
    const sentences = [];
    story.paragraphs.forEach(par => {
      if (par.length === 1 && /^(Chapitre|Première|Deuxième|Troisième)/.test(par[0])) return;
      par.forEach(s => {
        if (s.length < 25) return; // too short, often "Oh non !" type
        if (s.length > 140) return; // too long
        sentences.push(s);
      });
    });
    picker.style.display = 'block';
    picker.innerHTML = `
      <div class="picker-actions">
        <button type="button" data-action="select-all">Tout cocher</button>
        <button type="button" data-action="deselect-all">Tout décocher</button>
        <button type="button" data-action="smart-pick">🎯 Top 10 dessinables</button>
        <span class="count-label" id="picker-count">${sentences.length} cochées sur ${sentences.length}</span>
      </div>
      ${sentences.map((s, i) => {
        const hasJam = findJamData(s) !== null;
        return `
        <label style="display:block; padding:6px 8px; cursor:pointer; border-radius:4px;">
          <input type="checkbox" data-sentence="${i}" checked> ${s}
          ${hasJam ? '<span style="background:#fdf6ea; color:#b87333; border:1px solid #ecd9b4; padding:1px 7px; border-radius:999px; font-size:0.7rem; margin-left:6px; font-weight:600;">⚡ JAM</span>' : ''}
        </label>
      `;}).join('')}
      <button class="btn btn-primary" id="confirm-sentences" style="margin-top:14px">Valider la sélection</button>
    `;
    function updatePickerCount() {
      const total = picker.querySelectorAll('input[type="checkbox"]').length;
      const checked = picker.querySelectorAll('input[type="checkbox"]:checked').length;
      const count = picker.querySelector('#picker-count');
      if (count) count.textContent = `${checked} cochées sur ${total}`;
    }
    picker.querySelector('[data-action="select-all"]').addEventListener('click', () => {
      picker.querySelectorAll('input[type="checkbox"]').forEach(b => b.checked = true);
      updatePickerCount();
    });
    picker.querySelector('[data-action="deselect-all"]').addEventListener('click', () => {
      picker.querySelectorAll('input[type="checkbox"]').forEach(b => b.checked = false);
      updatePickerCount();
    });
    picker.querySelector('[data-action="smart-pick"]').addEventListener('click', () => {
      // Score each sentence by drawability, take top 10
      const checkboxes = Array.from(picker.querySelectorAll('input[type="checkbox"]'));
      const scored = checkboxes.map(cb => {
        const idx = parseInt(cb.dataset.sentence, 10);
        return { cb, score: scoreSentence(sentences[idx]) };
      });
      scored.sort((a, b) => b.score - a.score);
      checkboxes.forEach(cb => cb.checked = false);
      scored.slice(0, 10).forEach(({ cb }) => cb.checked = true);
      updatePickerCount();
    });
    picker.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.addEventListener('change', updatePickerCount));
    picker.querySelector('#confirm-sentences').addEventListener('click', () => {
      const boxes = Array.from(picker.querySelectorAll('input[type="checkbox"]:checked'));
      selectedSentences = boxes.map(b => sentences[parseInt(b.dataset.sentence, 10)]);
      if (selectedSentences.length === 0) { alert("Coche au moins une phrase."); return; }
      shell.querySelector('#control-panel').style.display = 'block';
      shell.querySelector('#stat-idx').textContent = `0 / ${selectedSentences.length}`;
    });
  });

  // Control buttons
  const startBtn = shell.querySelector('#btn-start');
  const nextBtn = shell.querySelector('#btn-next');
  const voteBtn = shell.querySelector('#btn-vote');
  const resultsBtn = shell.querySelector('#btn-results');
  const jamBtn = shell.querySelector('#btn-jam');
  const endBtn = shell.querySelector('#btn-end');
  const phaseBadge = shell.querySelector('#phase-badge');
  const currentSentenceEl = shell.querySelector('#current-sentence');
  const studentLinkEl = shell.querySelector('#student-link');
  const galleryEl = shell.querySelector('#teacher-gallery');

  let sessionId = null;
  let pendingJamTimeout = null;
  const fs = await getFirestoreApi();

  function studentURL(code, sid) {
    const u = new URL(window.location.href);
    u.searchParams.set('mode', 'game-student');
    u.searchParams.set('class', code);
    u.searchParams.set('session', sid);
    return u.toString();
  }

  jamBtn.addEventListener('click', async () => {
    if (!sessionId || !gameSession) return;
    if (!findJamData(gameSession.sentences[gameSession.currentIdx])) {
      alert("Pas de données Sentence Jam pour cette phrase.");
      return;
    }
    if (pendingJamTimeout) { clearTimeout(pendingJamTimeout); pendingJamTimeout = null; }
    await fs.updateDoc(fs.doc(firestore, `game_sessions/${sessionId}`), {
      phase: 'jam',
      jamStartedAt: fs.serverTimestamp(),
      updatedAt: fs.serverTimestamp()
    });
    jamBtn.disabled = true;
  });

  // ---- Music player ----
  const audioEl = shell.querySelector('#bg-music');
  const mwPlay = shell.querySelector('#mw-play');
  const mwLabel = shell.querySelector('#mw-label');
  const mwVol = shell.querySelector('#mw-vol');
  const mwTime = shell.querySelector('#mw-time');
  const mwWidget = shell.querySelector('#music-widget');
  // Restore saved volume
  const savedVol = parseFloat(localStorage.getItem('histoiresFII.musicVol') || '0.4');
  audioEl.volume = Math.max(0, Math.min(1, savedVol));
  mwVol.value = Math.round(audioEl.volume * 100);
  mwVol.addEventListener('input', () => {
    const v = mwVol.value / 100;
    audioEl.volume = v;
    localStorage.setItem('histoiresFII.musicVol', String(v));
  });
  mwPlay.addEventListener('click', async () => {
    if (audioEl.paused) {
      try {
        await audioEl.play();
        mwPlay.textContent = '⏸';
        mwLabel.textContent = 'Musique en cours…';
        mwWidget.classList.add('playing');
      } catch (err) {
        mwLabel.textContent = 'Lecture bloquée — autorise l\'audio sur ce site.';
        console.warn('audio play blocked', err);
      }
    } else {
      audioEl.pause();
      mwPlay.textContent = '▶';
      mwLabel.textContent = 'Musique de fond (pause)';
      mwWidget.classList.remove('playing');
    }
  });
  function fmtTime(s) {
    if (!isFinite(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return `${m}:${sec}`;
  }
  audioEl.addEventListener('timeupdate', () => {
    mwTime.textContent = `${fmtTime(audioEl.currentTime)} / ${fmtTime(audioEl.duration)}`;
  });
  audioEl.addEventListener('ended', () => { /* loop attr handles restart; nothing needed */ });

  // ---- Mid-game: add story sentences ----
  const addStoryBtn = shell.querySelector('#btn-add-story');
  const addPanel = shell.querySelector('#add-story-panel');
  const addStoryPick = shell.querySelector('#add-story-pick');
  const addSentencePicker = shell.querySelector('#add-sentence-picker');
  const confirmAddBtn = shell.querySelector('#btn-confirm-add');
  const cancelAddBtn = shell.querySelector('#btn-cancel-add');
  let pendingAddSentences = [];

  // ---- Sentence visibility mode toggle ----
  const modeBtn = shell.querySelector('#btn-mode-toggle');
  modeBtn.dataset.mode = 'visible'; // pre-game default

  function applyModeLabel(visible) {
    if (visible) {
      modeBtn.textContent = '👁 Phrase visible';
      modeBtn.classList.remove('listen-mode');
      modeBtn.dataset.mode = 'visible';
    } else {
      modeBtn.textContent = '🔊 Phrase à dire';
      modeBtn.classList.add('listen-mode');
      modeBtn.dataset.mode = 'listen';
    }
  }
  modeBtn.addEventListener('click', async () => {
    const currentlyVisible = modeBtn.dataset.mode === 'visible';
    const newValue = !currentlyVisible;
    applyModeLabel(newValue);
    // If game already running, push the change to the session immediately
    if (sessionId && gameSession) {
      try {
        await fs.updateDoc(fs.doc(firestore, `game_sessions/${sessionId}`), {
          sentenceVisible: newValue,
          updatedAt: fs.serverTimestamp()
        });
      } catch (err) { console.warn("mode toggle write failed", err); }
    }
  });

  addStoryBtn.addEventListener('click', () => {
    addPanel.classList.toggle('shown');
    if (!addPanel.classList.contains('shown')) {
      addStoryPick.value = '';
      addSentencePicker.classList.remove('shown');
      pendingAddSentences = [];
      confirmAddBtn.disabled = true;
    }
  });
  cancelAddBtn.addEventListener('click', () => {
    addPanel.classList.remove('shown');
    addStoryPick.value = '';
    addSentencePicker.classList.remove('shown');
    pendingAddSentences = [];
    confirmAddBtn.disabled = true;
  });
  addStoryPick.addEventListener('change', e => {
    const sid = e.target.value;
    if (!sid) { addSentencePicker.classList.remove('shown'); return; }
    const story = STORIES.find(s => s.id === sid);
    if (!story) return;
    const sentences = [];
    story.paragraphs.forEach(par => {
      if (par.length === 1 && /^(Chapitre|Première|Deuxième|Troisième)/.test(par[0])) return;
      par.forEach(s => {
        if (s.length < 25 || s.length > 140) return;
        sentences.push(s);
      });
    });
    addSentencePicker.classList.add('shown');
    addSentencePicker.innerHTML = `
      <div class="picker-actions">
        <button type="button" data-action="select-all">Tout cocher</button>
        <button type="button" data-action="deselect-all">Tout décocher</button>
        <button type="button" data-action="smart-pick">🎯 Top 10 dessinables</button>
        <span class="count-label" id="add-picker-count">0 cochées sur ${sentences.length}</span>
      </div>
      ${sentences.map((s, i) => {
        const hasJam = findJamData(s) !== null;
        return `
        <label style="display:block; padding:6px 8px; cursor:pointer; border-radius:4px;">
          <input type="checkbox" data-sentence="${i}"> ${s}
          ${hasJam ? '<span style="background:#fdf6ea; color:#b87333; border:1px solid #ecd9b4; padding:1px 7px; border-radius:999px; font-size:0.7rem; margin-left:6px; font-weight:600;">⚡ JAM</span>' : ''}
        </label>
      `;}).join('')}
    `;
    function updateAddCount() {
      const total = addSentencePicker.querySelectorAll('input[type="checkbox"]').length;
      const checked = Array.from(addSentencePicker.querySelectorAll('input[type="checkbox"]:checked'));
      pendingAddSentences = checked.map(b => sentences[parseInt(b.dataset.sentence, 10)]);
      const count = addSentencePicker.querySelector('#add-picker-count');
      if (count) count.textContent = `${checked.length} cochées sur ${total}`;
      confirmAddBtn.disabled = checked.length === 0;
    }
    addSentencePicker.querySelector('[data-action="select-all"]').addEventListener('click', () => {
      addSentencePicker.querySelectorAll('input[type="checkbox"]').forEach(b => b.checked = true);
      updateAddCount();
    });
    addSentencePicker.querySelector('[data-action="deselect-all"]').addEventListener('click', () => {
      addSentencePicker.querySelectorAll('input[type="checkbox"]').forEach(b => b.checked = false);
      updateAddCount();
    });
    addSentencePicker.querySelector('[data-action="smart-pick"]').addEventListener('click', () => {
      const checkboxes = Array.from(addSentencePicker.querySelectorAll('input[type="checkbox"]'));
      const scored = checkboxes.map(cb => {
        const idx = parseInt(cb.dataset.sentence, 10);
        return { cb, score: scoreSentence(sentences[idx]) };
      });
      scored.sort((a, b) => b.score - a.score);
      checkboxes.forEach(cb => cb.checked = false);
      scored.slice(0, 10).forEach(({ cb }) => cb.checked = true);
      updateAddCount();
    });
    addSentencePicker.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.addEventListener('change', updateAddCount));
    updateAddCount();
  });
  confirmAddBtn.addEventListener('click', async () => {
    if (!sessionId || !gameSession || pendingAddSentences.length === 0) return;
    const merged = [...gameSession.sentences, ...pendingAddSentences];
    await fs.updateDoc(fs.doc(firestore, `game_sessions/${sessionId}`), {
      sentences: merged,
      updatedAt: fs.serverTimestamp()
    });
    // Pre-translate newly added auto-generated sentences
    pendingAddSentences.forEach(s => {
      const handAuthored = JAM_SENTENCES.find(j => j.fr === s || s.includes(j.fr) || j.fr.includes(s));
      if (!handAuthored) translateFrToEn(s);
    });
    addPanel.classList.remove('shown');
    addStoryPick.value = '';
    addSentencePicker.classList.remove('shown');
    pendingAddSentences = [];
    confirmAddBtn.disabled = true;
    // Notify quietly
    const note = document.createElement('div');
    note.style.cssText = 'background:var(--sage-soft); color:var(--sage); padding:8px 14px; border-radius:6px; margin-top:8px; font-size:0.88rem;';
    note.textContent = `✓ ${merged.length - gameSession.sentences.length} phrases ajoutées. Total : ${merged.length}.`;
    shell.querySelector('#control-panel').appendChild(note);
    setTimeout(() => note.remove(), 4000);
  });

  startBtn.addEventListener('click', async () => {
    if (selectedSentences.length === 0) return;
    sessionId = `${classCode}_${Date.now()}`;
    const drawingSeconds = parseInt(shell.querySelector('#draw-seconds').value, 10) || 0;
    const voteMode = shell.querySelector('#vote-mode').value || 'top3';
    const voteSeconds = voteMode === 'spam' ? 20 : 0;
    const jamEnabled = shell.querySelector('#jam-enabled').value === '1';
    const jamSeconds = 30;
    const docRef = fs.doc(firestore, `game_sessions/${sessionId}`);
    await fs.setDoc(docRef, {
      classCode,
      sentences: selectedSentences,
      currentIdx: 0,
      phase: 'drawing',
      drawingSeconds,
      voteMode,
      voteSeconds,
      jamEnabled,
      jamSeconds,
      sentenceVisible: shell.querySelector('#btn-mode-toggle').dataset.mode !== 'listen',
      roundStartedAt: fs.serverTimestamp(),
      voteStartedAt: null,
      jamStartedAt: null,
      createdAt: fs.serverTimestamp(),
      updatedAt: fs.serverTimestamp()
    });
    startBtn.disabled = true;
    // Lock settings once the game is running
    shell.querySelector('#draw-seconds').disabled = true;
    shell.querySelector('#vote-mode').disabled = true;
    shell.querySelector('#jam-enabled').disabled = true;
    // Fire-and-forget: pre-translate all auto-generated jam sentences so English
    // is in cache by the time students reach the jam phase
    selectedSentences.forEach(s => {
      const handAuthored = JAM_SENTENCES.find(j => j.fr === s || s.includes(j.fr) || j.fr.includes(s));
      if (!handAuthored) translateFrToEn(s);
    });
    nextBtn.disabled = false;
    voteBtn.disabled = false;
    endBtn.disabled = false;
    addStoryBtn.disabled = false;
    phaseBadge.textContent = 'Phase : dessin';
    phaseBadge.className = 'game-phase-badge drawing';
    currentSentenceEl.textContent = selectedSentences[0];
    studentLinkEl.textContent = studentURL(classCode, sessionId);
    listenSession(sessionId);
  });

  async function listenSession(sid) {
    if (gameSessionUnsub) gameSessionUnsub();
    if (gameDrawingsUnsub) gameDrawingsUnsub();
    if (gameVotesUnsub) gameVotesUnsub();
    if (gameJamUnsub) gameJamUnsub();
    gameSessionUnsub = fs.onSnapshot(fs.doc(firestore, `game_sessions/${sid}`), snap => {
      const data = snap.data();
      if (!data) return;
      gameSession = data;
      currentSentenceEl.textContent = data.sentences[data.currentIdx] || '—';
      shell.querySelector('#stat-idx').textContent = `${data.currentIdx + 1} / ${data.sentences.length}`;
      const phaseLabel = data.phase === 'drawing' ? 'dessin' : data.phase === 'voting' ? 'vote' : data.phase === 'jam' ? 'sentence jam ⚡' : data.phase === 'results' ? 'résultats' : 'terminé';
      phaseBadge.textContent = `Phase : ${phaseLabel}`;
      phaseBadge.className = `game-phase-badge ${data.phase}`;
      // Drive the timer
      if (data.phase === 'drawing' && data.drawingSeconds > 0) {
        showTimer(tsToMs(data.roundStartedAt), data.drawingSeconds, null);
      } else if (data.phase === 'voting' && data.voteMode === 'spam' && data.voteSeconds > 0) {
        showTimer(tsToMs(data.voteStartedAt), data.voteSeconds, null);
      } else if (data.phase === 'jam' && data.jamSeconds > 0) {
        showTimer(tsToMs(data.jamStartedAt), data.jamSeconds, null);
      } else {
        hideTimer();
      }
      // Enable jam button when in results phase and jam is enabled and data exists for current sentence
      const canJam = data.phase === 'results'
                  && data.jamEnabled
                  && findJamData(data.sentences[data.currentIdx]) !== null;
      jamBtn.disabled = !canJam;
      jamBtn.style.opacity = canJam ? '1' : '0.5';
      // Sync mode toggle button label with session state
      applyModeLabel(data.sentenceVisible !== false);
      // Render attendance chips
      renderAttendance(shell, data.claimedNames || {}, sessionId, fs);
      renderTeacherGallery(galleryEl, data);
    });
    gameDrawingsUnsub = fs.onSnapshot(fs.collection(firestore, `game_sessions/${sid}/game_drawings`), snap => {
      gameDrawings = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      const forCurrent = gameDrawings.filter(d => d.sentenceIdx === (gameSession?.currentIdx ?? -1));
      shell.querySelector('#stat-submitted').textContent = forCurrent.length;
      renderTeacherGallery(galleryEl, gameSession);
    });
    gameVotesUnsub = fs.onSnapshot(fs.collection(firestore, `game_sessions/${sid}/votes`), snap => {
      gameVotes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderTeacherGallery(galleryEl, gameSession);
    });
    gameJamUnsub = fs.onSnapshot(fs.collection(firestore, `game_sessions/${sid}/jam_submissions`), snap => {
      gameJamSubmissions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderTeacherGallery(galleryEl, gameSession);
    });
  }

  voteBtn.addEventListener('click', async () => {
    if (!sessionId) return;
    await fs.updateDoc(fs.doc(firestore, `game_sessions/${sessionId}`), {
      phase: 'voting',
      voteStartedAt: fs.serverTimestamp(),
      updatedAt: fs.serverTimestamp()
    });
    resultsBtn.disabled = false;
    voteBtn.disabled = true;
  });

  resultsBtn.addEventListener('click', async () => {
    if (!sessionId) return;
    await fs.updateDoc(fs.doc(firestore, `game_sessions/${sessionId}`), {
      phase: 'results',
      updatedAt: fs.serverTimestamp()
    });
    resultsBtn.disabled = true;
    // Auto-fire jam after a short pause if jam is enabled and data exists for this sentence
    if (gameSession && gameSession.jamEnabled && findJamData(gameSession.sentences[gameSession.currentIdx])) {
      if (pendingJamTimeout) clearTimeout(pendingJamTimeout);
      pendingJamTimeout = setTimeout(async () => {
        pendingJamTimeout = null;
        try {
          await fs.updateDoc(fs.doc(firestore, `game_sessions/${sessionId}`), {
            phase: 'jam',
            jamStartedAt: fs.serverTimestamp(),
            updatedAt: fs.serverTimestamp()
          });
        } catch (err) { console.warn("auto-jam transition failed", err); }
      }, 5000);
    }
  });

  nextBtn.addEventListener('click', async () => {
    if (!sessionId || !gameSession) return;
    if (pendingJamTimeout) { clearTimeout(pendingJamTimeout); pendingJamTimeout = null; }
    const nextIdx = gameSession.currentIdx + 1;
    if (nextIdx >= gameSession.sentences.length) {
      alert("Plus de phrases — clique sur « Fin du jeu » quand tu es prêt.");
      return;
    }
    await fs.updateDoc(fs.doc(firestore, `game_sessions/${sessionId}`), {
      currentIdx: nextIdx,
      phase: 'drawing',
      roundStartedAt: fs.serverTimestamp(),
      voteStartedAt: null,
      jamStartedAt: null,
      updatedAt: fs.serverTimestamp()
    });
    voteBtn.disabled = false;
    resultsBtn.disabled = true;
    jamBtn.disabled = true;
  });

  endBtn.addEventListener('click', async () => {
    if (!sessionId) return;
    if (!confirm("Terminer le jeu ?")) return;
    if (pendingJamTimeout) { clearTimeout(pendingJamTimeout); pendingJamTimeout = null; }
    await fs.updateDoc(fs.doc(firestore, `game_sessions/${sessionId}`), {
      phase: 'ended',
      updatedAt: fs.serverTimestamp()
    });
    if (gameSessionUnsub) gameSessionUnsub();
    if (gameDrawingsUnsub) gameDrawingsUnsub();
    if (gameVotesUnsub) gameVotesUnsub();
    if (gameJamUnsub) gameJamUnsub();
    hideTimer();
    // Stop music
    audioEl.pause();
    audioEl.currentTime = 0;
    mwPlay.textContent = '▶';
    mwLabel.textContent = 'Musique de fond';
    mwWidget.classList.remove('playing');
    // Show cumulative leaderboards
    renderCumulativeLeaderboards(galleryEl);
  });
}

function renderAttendance(shell, claimedNames, sessionId, fs) {
  const list = shell.querySelector('#attendance-list');
  if (!list) return;
  const entries = Object.entries(claimedNames || {});
  if (entries.length === 0) {
    list.innerHTML = `<span class="attendance-empty">Personne n'a encore rejoint la partie.</span>`;
    return;
  }
  list.innerHTML = '';
  // Sort to keep stable display order
  entries.sort((a, b) => a[0].localeCompare(b[0], 'fr'));
  entries.forEach(([name, deviceId]) => {
    const chip = document.createElement('span');
    chip.className = 'attendance-chip';
    chip.innerHTML = `${name}<button class="release-btn" title="Libérer ${name}" aria-label="Libérer ${name}">×</button>`;
    chip.querySelector('.release-btn').addEventListener('click', async () => {
      if (!confirm(`Libérer "${name}" ? Un(e) autre élève pourra le choisir.`)) return;
      try {
        await fs.runTransaction(firestore, async tx => {
          const ref = fs.doc(firestore, `game_sessions/${sessionId}`);
          const snap = await tx.get(ref);
          if (!snap.exists()) return;
          const data = snap.data();
          const cn = { ...(data.claimedNames || {}) };
          delete cn[name];
          tx.update(ref, { claimedNames: cn });
        });
      } catch (err) {
        console.warn("release failed", err);
        alert("Erreur — réessaie.");
      }
    });
    list.appendChild(chip);
  });
}

function renderTeacherGallery(host, session) {
  if (!host || !session) return;
  const idx = session.currentIdx;
  const phase = session.phase;
  const drawingsForRound = gameDrawings.filter(d => d.sentenceIdx === idx);

  // Special case: jam phase shows the jam leaderboard prominently
  if (phase === 'jam') {
    const jamData = findJamData(session.sentences[idx]);
    const submissionsForRound = gameJamSubmissions.filter(s => s.sentenceIdx === idx);
    const correct = submissionsForRound.filter(s => s.correct).sort((a, b) => a.elapsedMs - b.elapsedMs);
    const wrong = submissionsForRound.filter(s => !s.correct);
    const teacherTarget = jamData
      ? (jamData.en
          ? `<div class="jam-english">${jamData.en}</div>`
          : `<div class="jam-english" style="font-style:normal; font-size:1.2rem"><span style="font-size:0.72rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--beige); display:block; margin-bottom:6px">Phrase cible</span>${jamData.fr}</div>`)
      : '<div class="jam-english">(pas de jam)</div>';
    host.innerHTML = `
      <div class="jam-panel">
        <p class="jam-eyebrow">Sentence Jam — Manche ${idx + 1}${jamData?.autoGenerated ? ' · auto' : ''}</p>
        ${teacherTarget}
        <p class="jam-instructions">Phrase cible : <b>${jamData ? jamData.fr : session.sentences[idx]}</b></p>
        <div class="jam-leaderboard">
          <h4>⚡ Classement de cette manche</h4>
          ${correct.length === 0 && wrong.length === 0
            ? '<p style="color:var(--muted)">En attente de soumissions…</p>'
            : correct.slice(0, 10).map((s, i) => {
                const cls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
                return `<div class="lb-row ${cls}">
                  <span class="lb-rank">${i + 1}</span>
                  <span class="lb-pseudo">${s.studentPseudonym}</span>
                  <span class="lb-time">${(s.elapsedMs / 1000).toFixed(1)}s</span>
                  <span class="lb-status correct">✓</span>
                </div>`;
              }).join('')
              + wrong.map(s => `<div class="lb-row">
                <span class="lb-rank">—</span>
                <span class="lb-pseudo">${s.studentPseudonym}</span>
                <span class="lb-time">${(s.elapsedMs / 1000).toFixed(1)}s</span>
                <span class="lb-status wrong">✗</span>
              </div>`).join('')
          }
        </div>
      </div>
    `;
    return;
  }

  if (drawingsForRound.length === 0) {
    host.innerHTML = `<div class="game-panel" style="text-align:center; color:var(--muted)">En attente de dessins…</div>`;
    return;
  }
  const showStars = phase === 'voting' || phase === 'results';
  const showPseudo = phase === 'results';
  const isSpam = session.voteMode === 'spam';
  const voteCounts = {};
  const allVotesForRound = gameVotes.filter(v => v.sentenceIdx === idx);
  allVotesForRound.forEach(v => {
    voteCounts[v.drawingId] = (voteCounts[v.drawingId] || 0) + 1;
  });
  const totalTaps = allVotesForRound.length;
  const cards = drawingsForRound.map(d => {
    const stars = voteCounts[d.id] || 0;
    return `
      <div class="vote-card ${showStars ? 'show-stars' : ''}">
        <img src="${d.imageDataUrl}" alt="">
        <div class="vote-star-count">★ ${stars}</div>
        <div class="pseudo-row ${showPseudo ? '' : 'hidden'}">${showPseudo ? d.studentPseudonym : '·'}</div>
      </div>
    `;
  }).join('');
  // Winner callout in results phase
  let winnerHTML = '';
  if (phase === 'results') {
    const winner = [...drawingsForRound].map(d => ({...d, stars: voteCounts[d.id] || 0}))
                                        .sort((a, b) => b.stars - a.stars)[0];
    if (winner && winner.stars > 0) {
      winnerHTML = `
        <div class="winner-callout">
          <h2>🏆 Gagnant de la manche</h2>
          <img src="${winner.imageDataUrl}" alt="">
          <div class="winner-info">${winner.studentPseudonym} — <span class="winner-stars">★ ${winner.stars}</span></div>
        </div>
      `;
    }
  }
  host.innerHTML = `
    ${winnerHTML}
    <div class="game-panel">
      <h3 style="margin-top:0">Dessins (${drawingsForRound.length})</h3>
      ${isSpam && (phase === 'voting' || phase === 'results') ? `
        <div class="spam-total-banner">
          <span>⚡</span>
          <span class="total-num">${totalTaps}</span>
          <span>taps cette manche !</span>
        </div>
      ` : ''}
      <div class="vote-grid ${isSpam ? 'spam-mode' : ''}">${cards}</div>
    </div>
  `;
}

// Pre-selected student roster. Names are locked to a device once claimed in a
// session. Teacher can release a claim from the teacher control panel.
const STUDENT_ROSTER = [
  "Lillian", "Rhys", "Eli", "Anna", "Andrew",
  "Jean", "Juanita", "Kate", "Adéline", "Margaretta",
  "Hampton", "Marguerite", "Rowan", "Henri", "Matéo"
];

function getOrCreateDeviceId() {
  let id = localStorage.getItem('histoiresFII.deviceId');
  if (!id) {
    id = (crypto.randomUUID && crypto.randomUUID()) ||
         (Math.random().toString(36).slice(2) + Date.now().toString(36));
    localStorage.setItem('histoiresFII.deviceId', id);
  }
  return id;
}

// Atomically claim a name. Throws if another device already holds it.
async function claimRosterName(sessionId, name, deviceId) {
  const fs = await getFirestoreApi();
  return fs.runTransaction(firestore, async tx => {
    const ref = fs.doc(firestore, `game_sessions/${sessionId}`);
    const snap = await tx.get(ref);
    if (!snap.exists()) throw new Error("session-missing");
    const data = snap.data();
    const claimedNames = { ...(data.claimedNames || {}) };
    const existing = claimedNames[name];
    if (existing && existing !== deviceId) throw new Error("name-taken");
    // Release any other name this device previously claimed
    Object.keys(claimedNames).forEach(n => {
      if (claimedNames[n] === deviceId && n !== name) delete claimedNames[n];
    });
    claimedNames[name] = deviceId;
    tx.update(ref, { claimedNames });
  });
}

// Show roster picker and resolve with the chosen name. Auto-rejoins if this
// device already holds a name in the session.
async function pickNameFromRoster(host, sessionId, deviceId) {
  const fs = await getFirestoreApi();
  return new Promise(resolve => {
    let unsub = null;
    function render(claimedNames) {
      const grid = host.querySelector('#roster-grid');
      if (!grid) return;
      grid.innerHTML = '';
      STUDENT_ROSTER.forEach(name => {
        const claimedBy = claimedNames[name];
        const btn = document.createElement('button');
        btn.className = 'roster-btn';
        if (claimedBy) {
          btn.classList.add('claimed');
          btn.disabled = true;
          btn.innerHTML = `${name} <span class="check">✓</span>`;
        } else {
          btn.textContent = name;
          btn.addEventListener('click', async () => {
            btn.disabled = true; // anti double-click
            try {
              await claimRosterName(sessionId, name, deviceId);
              if (unsub) unsub();
              resolve(name);
            } catch (err) {
              btn.disabled = false;
              if (err.message === 'name-taken') {
                alert(`"${name}" est déjà pris. Choisis-en un autre.`);
              } else if (err.message === 'session-missing') {
                alert("La session n'existe plus. Recharge la page.");
              } else {
                console.warn("claim failed", err);
                alert("Erreur. Réessaie.");
              }
            }
          });
        }
        grid.appendChild(btn);
      });
    }
    unsub = fs.onSnapshot(fs.doc(firestore, `game_sessions/${sessionId}`), snap => {
      const data = snap.data();
      if (!data) {
        const grid = host.querySelector('#roster-grid');
        if (grid) grid.innerHTML = '<p style="color:var(--muted)">En attente du professeur pour lancer la partie…</p>';
        return;
      }
      const claimedNames = data.claimedNames || {};
      // Auto-rejoin: if THIS device already claimed a name, proceed silently
      const myEntry = Object.entries(claimedNames).find(([n, did]) => did === deviceId);
      if (myEntry) {
        if (unsub) unsub();
        resolve(myEntry[0]);
        return;
      }
      render(claimedNames);
    });
  });
}

async function renderStudentView(shell, classCode) {
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get('session');
  if (!sessionId) {
    shell.innerHTML = `<h1>Lien invalide</h1><p>Le lien du jeu doit inclure un identifiant de session. Demande à ton professeur de te renvoyer le lien complet.</p>`;
    return;
  }
  // Step 1: roster name pick (or auto-rejoin if this device already claimed)
  shell.innerHTML = `
    <p class="game-eyebrow">Mode jeu</p>
    <div class="roster-picker">
      <h2 class="roster-title">Choisis ton prénom</h2>
      <p class="roster-hint">Une fois choisi, ton prénom est verrouillé pour cette partie. Si tu te trompes, demande au prof de le libérer.</p>
      <div class="roster-grid" id="roster-grid"></div>
    </div>
  `;
  const deviceId = getOrCreateDeviceId();
  const pseudo = await pickNameFromRoster(shell, sessionId, deviceId);
  // Step 2: render the regular game shell now that we have a confirmed name
  shell.innerHTML = `
    <p class="game-eyebrow">Mode jeu · ${pseudo}<button class="change-name-link" id="change-name-link" title="Libérer ton prénom et choisir à nouveau">(changer)</button></p>
    <div class="game-phase-badge drawing" id="phase-badge">Attente du professeur…</div>
    <div class="game-banner-sentence huge" id="sentence-display">— Le professeur va envoyer la première phrase —</div>
    <div id="student-stage"></div>
  `;
  shell.querySelector('#change-name-link').addEventListener('click', async () => {
    if (!confirm("Changer de prénom ? Tu vas libérer ton prénom et devras choisir à nouveau. Tes votes et dessins de cette partie seront perdus.")) return;
    try {
      const fs2 = await getFirestoreApi();
      await fs2.runTransaction(firestore, async tx => {
        const ref = fs2.doc(firestore, `game_sessions/${sessionId}`);
        const snap = await tx.get(ref);
        if (!snap.exists()) return;
        const data = snap.data();
        const cn = { ...(data.claimedNames || {}) };
        Object.keys(cn).forEach(n => {
          if (cn[n] === deviceId) delete cn[n];
        });
        tx.update(ref, { claimedNames: cn });
      });
      location.reload();
    } catch (err) {
      console.warn("release failed", err);
      alert("Erreur. Réessaie.");
    }
  });
  const fs = await getFirestoreApi();

  let drawnForIdx = -1;
  let votedForIdx = -1;

  gameSessionUnsub = fs.onSnapshot(fs.doc(firestore, `game_sessions/${sessionId}`), snap => {
    const data = snap.data();
    if (!data) { shell.querySelector('#sentence-display').textContent = "Session introuvable."; return; }
    gameSession = data;
    const sentence = data.sentences[data.currentIdx] || '—';
    // Banner logic:
    //  - Drawing phase, listening mode ON → hide sentence, prompt students to listen
    //  - Jam phase → English (hand-authored) or generic prompt (auto-gen); never French
    //  - Other phases → show the sentence
    let bannerText = sentence;
    const banner = shell.querySelector('#sentence-display');
    banner.classList.remove('listening-banner');
    if (data.phase === 'drawing' && data.sentenceVisible === false) {
      bannerText = '🔊 Écoute attentivement le professeur';
      banner.classList.add('listening-banner');
    } else if (data.phase === 'jam') {
      const jd = findJamData(sentence);
      bannerText = (jd && jd.en) ? jd.en : '⚡ Sentence Jam — reconstruis la phrase de mémoire';
    }
    banner.textContent = bannerText;
    const badge = shell.querySelector('#phase-badge');
    badge.className = `game-phase-badge ${data.phase}`;
    badge.textContent = data.phase === 'drawing' ? `Phase ${data.currentIdx + 1} : dessine !`
      : data.phase === 'voting' ? `Phase ${data.currentIdx + 1} : vote pour tes préférés`
      : data.phase === 'jam' ? `Phase ${data.currentIdx + 1} : ⚡ Sentence Jam !`
      : data.phase === 'results' ? `Phase ${data.currentIdx + 1} : résultats`
      : 'Le jeu est terminé.';
    const stage = shell.querySelector('#student-stage');
    if (data.phase === 'drawing') {
      if (data.drawingSeconds > 0) {
        showTimer(tsToMs(data.roundStartedAt), data.drawingSeconds, () => {
          const btn = document.querySelector('#submit-game-drawing');
          if (btn && !btn.disabled) btn.click();
        });
      } else {
        hideTimer();
      }
      if (drawnForIdx !== data.currentIdx) {
        stage.innerHTML = '';
        stage.appendChild(buildStudentCanvas(sessionId, pseudo, data.currentIdx, () => { drawnForIdx = data.currentIdx; }));
      }
    } else if (data.phase === 'voting' || data.phase === 'results') {
      if (data.phase === 'voting' && data.voteMode === 'spam' && data.voteSeconds > 0) {
        showTimer(tsToMs(data.voteStartedAt), data.voteSeconds, () => {
          renderStudentVoting(shell.querySelector('#student-stage'), sessionId, pseudo, data.currentIdx, data.phase, data);
        });
      } else {
        hideTimer();
      }
      renderStudentVoting(stage, sessionId, pseudo, data.currentIdx, data.phase, data);
    } else if (data.phase === 'jam') {
      const jamData = findJamData(sentence);
      if (data.jamSeconds > 0) {
        showTimer(tsToMs(data.jamStartedAt), data.jamSeconds, () => {
          // Re-render to lock the UI
          renderStudentJam(shell.querySelector('#student-stage'), sessionId, pseudo, data.currentIdx, data, jamData);
        });
      }
      if (jammedForIdx !== data.currentIdx) {
        stage.innerHTML = '';
        stage.appendChild(renderStudentJam(stage, sessionId, pseudo, data.currentIdx, data, jamData));
      }
    } else if (data.phase === 'ended') {
      hideTimer();
      renderStudentCumulative(stage, data, pseudo);
    } else {
      hideTimer();
      stage.innerHTML = `<div class="game-panel" style="text-align:center">Merci d'avoir joué !</div>`;
    }
  });

  gameDrawingsUnsub = fs.onSnapshot(fs.collection(firestore, `game_sessions/${sessionId}/game_drawings`), snap => {
    gameDrawings = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    // Update the submission count indicator if it's visible (drawing phase only)
    if (gameSession && gameSession.phase === 'drawing') {
      const count = gameDrawings.filter(d => d.sentenceIdx === gameSession.currentIdx).length;
      const indicator = document.getElementById('submission-count');
      if (indicator) {
        indicator.style.display = count > 0 ? 'inline-flex' : 'none';
        indicator.textContent = `${count} dessin${count > 1 ? 's' : ''} envoyé${count > 1 ? 's' : ''} ✓`;
        indicator.classList.remove('bump');
        requestAnimationFrame(() => {
          requestAnimationFrame(() => indicator.classList.add('bump'));
        });
        setTimeout(() => indicator.classList.remove('bump'), 220);
      }
    }
    if (gameSession && (gameSession.phase === 'voting' || gameSession.phase === 'results')) {
      renderStudentVoting(shell.querySelector('#student-stage'), sessionId, pseudo, gameSession.currentIdx, gameSession.phase, gameSession);
    } else if (gameSession && gameSession.phase === 'ended') {
      renderStudentCumulative(shell.querySelector('#student-stage'), gameSession, pseudo);
    }
  });

  gameVotesUnsub = fs.onSnapshot(fs.collection(firestore, `game_sessions/${sessionId}/votes`), snap => {
    gameVotes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (gameSession && (gameSession.phase === 'voting' || gameSession.phase === 'results')) {
      renderStudentVoting(shell.querySelector('#student-stage'), sessionId, pseudo, gameSession.currentIdx, gameSession.phase, gameSession);
    } else if (gameSession && gameSession.phase === 'ended') {
      renderStudentCumulative(shell.querySelector('#student-stage'), gameSession, pseudo);
    }
  });

  gameJamUnsub = fs.onSnapshot(fs.collection(firestore, `game_sessions/${sessionId}/jam_submissions`), snap => {
    gameJamSubmissions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    // Re-render jam state to show updated leaderboard / submission status
    if (gameSession && gameSession.phase === 'jam') {
      const jamData = findJamData(gameSession.sentences[gameSession.currentIdx]);
      // Only re-render the leaderboard portion; don't blow away the user's in-progress arrangement
      paintJamLeaderboard(shell.querySelector('#student-stage'), gameSession.currentIdx, pseudo);
    } else if (gameSession && gameSession.phase === 'ended') {
      renderStudentCumulative(shell.querySelector('#student-stage'), gameSession, pseudo);
    }
  });
}

// Student-side jam UI
let jammedForIdx = -1;
function renderStudentJam(host, sessionId, pseudo, sentenceIdx, session, jamData) {
  if (!jamData) {
    host.innerHTML = `<div class="game-panel" style="text-align:center">Pas de Sentence Jam pour cette phrase.</div>`;
    return host;
  }

  // Check if already submitted
  const alreadySubmitted = gameJamSubmissions.find(s => s.sentenceIdx === sentenceIdx && s.studentPseudonym === pseudo);
  if (alreadySubmitted) {
    host.innerHTML = `
      <div class="jam-panel">
        <p class="jam-eyebrow">Sentence Jam — Manche ${sentenceIdx + 1}</p>
        <p style="font-weight:500; ${alreadySubmitted.correct ? 'color:var(--success)' : 'color:var(--error)'}">
          ${alreadySubmitted.correct ? '✓ Correct !' : '✗ Pas exact — la bonne réponse est en bas.'}
          Temps : ${(alreadySubmitted.elapsedMs / 1000).toFixed(1)}s
        </p>
        ${!alreadySubmitted.correct ? `<div style="padding:10px 14px; background:white; border-radius:6px; margin-bottom:14px"><b>${jamData.fr}</b></div>` : ''}
        <div id="jam-lb-mount"></div>
      </div>
    `;
    paintJamLeaderboard(host, sentenceIdx, pseudo);
    jammedForIdx = sentenceIdx;
    return host;
  }

  // Check if timer has expired
  const startMs = tsToMs(session.jamStartedAt);
  let timerExpired = false;
  if (startMs && session.jamSeconds) {
    const remaining = session.jamSeconds - (Date.now() - startMs) / 1000;
    if (remaining <= 0) timerExpired = true;
  }
  if (timerExpired) {
    host.innerHTML = `
      <div class="jam-panel">
        <p class="jam-eyebrow">Sentence Jam — Manche ${sentenceIdx + 1}</p>
        <p style="color:var(--muted)">⏱ Temps écoulé. La bonne réponse :</p>
        <div style="padding:10px 14px; background:white; border-radius:6px"><b>${jamData.fr}</b></div>
        <div id="jam-lb-mount"></div>
      </div>
    `;
    paintJamLeaderboard(host, sentenceIdx, pseudo);
    jammedForIdx = sentenceIdx;
    return host;
  }

  // Live jam UI
  const shuffled = shuffleArray(jamData.chunks);
  // Hand-authored: show English as scaffold. Auto-generated: no target at all.
  // Never show the French target during play.
  const targetHTML = jamData.en
    ? `<div class="jam-english">${jamData.en}</div>`
    : `<p class="jam-instructions" style="font-style:italic" id="jam-target-placeholder">Reconstruis la phrase de mémoire — sers-toi de ce que tu as vu pendant les phases dessin et vote.</p>`;
  host.innerHTML = `
    <div class="jam-panel">
      <p class="jam-eyebrow">Sentence Jam — Manche ${sentenceIdx + 1}</p>
      ${targetHTML}
      <p class="jam-instructions">Glisse ou tape les chunks dans le bon ordre :</p>
      <div class="jam-chunk-bank" id="jam-bank"></div>
      <div class="jam-slots" id="jam-slots"></div>
      <div class="jam-actions">
        <button class="btn btn-primary" id="jam-submit" disabled>Soumettre</button>
        <button class="btn btn-ghost" id="jam-clear">Réinitialiser</button>
        <span class="jam-status" id="jam-status"></span>
      </div>
      <div id="jam-lb-mount"></div>
    </div>
  `;

  // If no English yet (auto-generated), lazy-fetch translation and patch the UI
  if (!jamData.en && jamData.autoGenerated) {
    translateFrToEn(jamData.fr).then(en => {
      if (!en) return;
      // Don't patch if user has already moved on
      if (jammedForIdx !== sentenceIdx) return;
      // Replace the placeholder with English in the jam panel
      const placeholder = host.querySelector('#jam-target-placeholder');
      if (placeholder) {
        const enDiv = document.createElement('div');
        enDiv.className = 'jam-english';
        enDiv.textContent = en;
        placeholder.replaceWith(enDiv);
      }
      // Also update the top banner if we're still in jam phase
      const banner = document.querySelector('#sentence-display');
      if (banner && gameSession?.phase === 'jam') {
        banner.textContent = en;
      }
    });
  }

  const bank = host.querySelector('#jam-bank');
  const slots = host.querySelector('#jam-slots');
  const submitBtn = host.querySelector('#jam-submit');
  const clearBtn = host.querySelector('#jam-clear');
  const statusEl = host.querySelector('#jam-status');

  function paintBank(arr) {
    bank.innerHTML = '';
    arr.forEach(text => {
      const chip = document.createElement('div');
      chip.className = 'jam-chunk';
      chip.textContent = text;
      chip.draggable = true;
      chip.addEventListener('click', () => moveToSlots(chip, text));
      chip.addEventListener('dragstart', e => { chip.classList.add('dragging'); e.dataTransfer.setData('text/plain', text); e.dataTransfer.effectAllowed = 'move'; });
      chip.addEventListener('dragend', () => chip.classList.remove('dragging'));
      bank.appendChild(chip);
    });
  }

  function moveToSlots(chip, text) {
    chip.remove();
    const placed = document.createElement('div');
    placed.className = 'jam-chunk placed';
    placed.textContent = text;
    placed.draggable = true;
    placed.addEventListener('click', () => moveBackToBank(placed, text));
    placed.addEventListener('dragstart', e => { placed.classList.add('dragging'); e.dataTransfer.setData('text/plain', text); });
    placed.addEventListener('dragend', () => placed.classList.remove('dragging'));
    slots.appendChild(placed);
    checkSubmittable();
  }
  function moveBackToBank(placed, text) {
    placed.remove();
    const chip = document.createElement('div');
    chip.className = 'jam-chunk';
    chip.textContent = text;
    chip.draggable = true;
    chip.addEventListener('click', () => moveToSlots(chip, text));
    chip.addEventListener('dragstart', e => { chip.classList.add('dragging'); e.dataTransfer.setData('text/plain', text); });
    chip.addEventListener('dragend', () => chip.classList.remove('dragging'));
    bank.appendChild(chip);
    checkSubmittable();
  }
  function checkSubmittable() {
    submitBtn.disabled = bank.children.length > 0;
  }
  // Allow drop reorder within slots
  slots.addEventListener('dragover', e => { e.preventDefault(); });
  slots.addEventListener('drop', e => {
    e.preventDefault();
    const text = e.dataTransfer.getData('text/plain');
    // Find the element being dragged
    const dragging = slots.querySelector('.dragging') || bank.querySelector('.dragging');
    if (!dragging) return;
    // Determine drop target by mouse position
    const after = [...slots.children].find(child => {
      const rect = child.getBoundingClientRect();
      return e.clientX < rect.left + rect.width / 2;
    });
    if (dragging.parentNode === slots) {
      if (after) slots.insertBefore(dragging, after);
      else slots.appendChild(dragging);
    } else {
      // Came from bank
      moveToSlots(dragging, text);
    }
  });

  paintBank(shuffled);

  clearBtn.addEventListener('click', () => {
    // Move all placed chunks back to bank in original (shuffled) order
    paintBank(shuffled);
    slots.innerHTML = '';
    checkSubmittable();
    statusEl.textContent = '';
    statusEl.className = 'jam-status';
  });

  submitBtn.addEventListener('click', async () => {
    if (submitBtn.disabled) return;        // Idempotency guard
    submitBtn.disabled = true;
    const startMs = tsToMs(session.jamStartedAt);
    const elapsedMs = startMs ? Date.now() - startMs : 0;
    const placedOrder = [...slots.children].map(c => c.textContent);
    const isCorrect = placedOrder.length === jamData.chunks.length
      && placedOrder.every((t, i) => t === jamData.chunks[i]);

    statusEl.textContent = "Envoi en cours…";
    statusEl.className = 'jam-status';

    async function tryWrite() {
      const fs = await getFirestoreApi();
      return fs.addDoc(fs.collection(firestore, `game_sessions/${sessionId}/jam_submissions`), {
        studentPseudonym: pseudo,
        sentenceIdx,
        correct: isCorrect,
        submittedOrder: placedOrder,
        elapsedMs,
        createdAt: fs.serverTimestamp()
      });
    }

    try {
      try {
        await tryWrite();
      } catch (firstErr) {
        console.warn("first jam submit attempt failed, retrying in 700ms:", firstErr);
        statusEl.textContent = "Réessai…";
        await new Promise(r => setTimeout(r, 700));
        await tryWrite();
      }
      statusEl.textContent = isCorrect
        ? `✓ Correct ! ${(elapsedMs / 1000).toFixed(1)}s`
        : `✗ Pas exact — temps : ${(elapsedMs / 1000).toFixed(1)}s`;
      statusEl.className = 'jam-status ' + (isCorrect ? 'correct' : 'wrong');
    } catch (err) {
      console.error("jam submit failed after retry", err);
      let msg;
      if (err && err.code === 'permission-denied') {
        msg = "Refusé par Firebase. Le prof doit mettre à jour les règles.";
      } else if (err && (err.code === 'unavailable' || err.code === 'deadline-exceeded')) {
        msg = "Connexion lente. Réessaie.";
      } else {
        msg = `Erreur d'envoi (${err?.code || err?.message || 'inconnue'}). Réessaie.`;
      }
      statusEl.textContent = msg;
      statusEl.className = 'jam-status wrong';
      submitBtn.disabled = false;          // Allow retry
    }
  });

  jammedForIdx = sentenceIdx;
  paintJamLeaderboard(host, sentenceIdx, pseudo);
  return host;
}

function paintJamLeaderboard(host, sentenceIdx, pseudo) {
  const mount = host?.querySelector('#jam-lb-mount');
  if (!mount) return;
  const subs = gameJamSubmissions.filter(s => s.sentenceIdx === sentenceIdx);
  const correct = subs.filter(s => s.correct).sort((a, b) => a.elapsedMs - b.elapsedMs);
  if (subs.length === 0) {
    mount.innerHTML = '';
    return;
  }
  mount.innerHTML = `
    <div class="jam-leaderboard">
      <h4>⚡ Classement de cette manche</h4>
      ${correct.slice(0, 5).map((s, i) => {
        const cls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
        const me = s.studentPseudonym === pseudo ? ' <span style="color:var(--sage); font-weight:600;">(toi)</span>' : '';
        return `<div class="lb-row ${cls}">
          <span class="lb-rank">${i + 1}</span>
          <span class="lb-pseudo">${s.studentPseudonym}${me}</span>
          <span class="lb-time">${(s.elapsedMs / 1000).toFixed(1)}s</span>
          <span class="lb-status correct">✓</span>
        </div>`;
      }).join('')}
    </div>
  `;
}

// End-of-game cumulative leaderboards (votes + jam totals)
function renderCumulativeLeaderboards(host) {
  if (!host) return;
  // Votes received per pseudonym (across all sentences)
  const drawingsByPseudo = {};
  gameDrawings.forEach(d => {
    drawingsByPseudo[d.id] = d.studentPseudonym;
  });
  const votesByPseudo = {};
  gameVotes.forEach(v => {
    const author = drawingsByPseudo[v.drawingId];
    if (author) votesByPseudo[author] = (votesByPseudo[author] || 0) + 1;
  });
  const votesLB = Object.entries(votesByPseudo)
    .map(([pseudo, votes]) => ({ pseudo, votes }))
    .sort((a, b) => b.votes - a.votes);

  // Jam: sum of correct submission times per pseudonym; rank by lowest total + most correct
  const jamByPseudo = {};
  gameJamSubmissions.forEach(s => {
    if (!jamByPseudo[s.studentPseudonym]) {
      jamByPseudo[s.studentPseudonym] = { correctCount: 0, totalMs: 0 };
    }
    if (s.correct) {
      jamByPseudo[s.studentPseudonym].correctCount++;
      jamByPseudo[s.studentPseudonym].totalMs += s.elapsedMs;
    }
  });
  const jamLB = Object.entries(jamByPseudo)
    .map(([pseudo, v]) => ({ pseudo, ...v }))
    .filter(e => e.correctCount > 0)
    .sort((a, b) => {
      if (b.correctCount !== a.correctCount) return b.correctCount - a.correctCount;
      return a.totalMs - b.totalMs;
    });

  host.innerHTML = `
    <div class="game-panel">
      <h3 style="margin-top:0">🎉 Fin du jeu — classement final</h3>
      <div class="cumulative-leaderboards">
        <div class="jam-leaderboard" style="margin-top:0">
          <h4>🎨 Artistes les plus aimés (total des votes)</h4>
          ${votesLB.length === 0 ? '<p style="color:var(--muted)">Aucun vote.</p>' :
            votesLB.slice(0, 10).map((row, i) => {
              const cls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
              return `<div class="lb-row ${cls}">
                <span class="lb-rank">${i + 1}</span>
                <span class="lb-pseudo">${row.pseudo}</span>
                <span class="lb-time">${row.votes} vote${row.votes > 1 ? 's' : ''}</span>
              </div>`;
            }).join('')
          }
        </div>
        <div class="jam-leaderboard" style="margin-top:0">
          <h4>⚡ Sentence Jammers les plus rapides</h4>
          ${jamLB.length === 0 ? '<p style="color:var(--muted)">Pas de jam dans cette partie.</p>' :
            jamLB.slice(0, 10).map((row, i) => {
              const cls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
              return `<div class="lb-row ${cls}">
                <span class="lb-rank">${i + 1}</span>
                <span class="lb-pseudo">${row.pseudo}</span>
                <span class="lb-time">${row.correctCount} bon${row.correctCount > 1 ? 's' : ''} · ${(row.totalMs / 1000).toFixed(1)}s</span>
              </div>`;
            }).join('')
          }
        </div>
      </div>
    </div>
  `;
}

function renderStudentCumulative(host, session, pseudo) {
  if (!host) return;
  // Compute this student's personal stats
  const myDrawings = gameDrawings.filter(d => d.studentPseudonym === pseudo);
  const myDrawingIds = new Set(myDrawings.map(d => d.id));
  const votesForMe = gameVotes.filter(v => myDrawingIds.has(v.drawingId)).length;
  const myJams = gameJamSubmissions.filter(s => s.studentPseudonym === pseudo);
  const myCorrectJams = myJams.filter(s => s.correct);
  const myTotalMs = myCorrectJams.reduce((sum, s) => sum + s.elapsedMs, 0);

  // Render personal stats first, then the global cumulative leaderboards
  host.innerHTML = `
    <div class="game-panel personal-stats">
      <h3>Ta partie, ${pseudo}</h3>
      <div class="stat-row">
        <span class="stat-icon">🎨</span>
        <span>Dessins envoyés :</span>
        <span class="stat-num" style="margin-left:auto">${myDrawings.length}</span>
      </div>
      <div class="stat-row">
        <span class="stat-icon">⭐</span>
        <span>Votes reçus au total :</span>
        <span class="stat-num" style="margin-left:auto">${votesForMe}</span>
      </div>
      <div class="stat-row">
        <span class="stat-icon">⚡</span>
        <span>Sentence Jams réussis :</span>
        <span class="stat-num" style="margin-left:auto">${myCorrectJams.length} / ${myJams.length}${myCorrectJams.length > 0 ? ` en ${(myTotalMs/1000).toFixed(1)}s` : ''}</span>
      </div>
    </div>
    <div id="cumulative-mount"></div>
  `;
  renderCumulativeLeaderboards(host.querySelector('#cumulative-mount'));
}

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Histoires FII — Français B</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<style>
  /* =========================================================
     Design tokens
     ========================================================= */
  :root {
    --bg: #ffffff;
    --text: #1a1a1a;
    --muted: #6b7280;
    --sage: #4a7c59;
    --sage-soft: #e8f0ea;
    --beige: #d4a574;
    --surface: #faf8f3;
    --border: #e5e7eb;
    --border-strong: #d1d5db;
    --success: #15803d;
    --error: #b91c1c;
    --shadow-card: 0 1px 2px rgba(0,0,0,0.04);
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    --reading-max: 760px;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3, h4 { font-family: var(--serif); font-weight: 600; line-height: 1.25; margin: 0 0 0.5em; }
  p { margin: 0 0 1em; }
  a { color: var(--sage); text-decoration: none; }
  a:hover { text-decoration: underline; }
  button { font-family: var(--sans); cursor: pointer; }
  input, textarea, select { font-family: var(--sans); font-size: 1rem; }

  /* =========================================================
     App layout
     ========================================================= */
  .app {
    display: grid;
    grid-template-columns: 268px 1fr;
    min-height: 100vh;
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    grid-column: 1;
    border-right: 1px solid var(--border);
    background: var(--bg);
    padding: 28px 20px 32px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .sidebar-header {
    margin-bottom: 24px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-title {
    font-family: var(--serif);
    font-size: 1.35rem;
    font-weight: 600;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  .sidebar-subtitle {
    font-size: 0.78rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 0;
  }
  .sidebar-student {
    margin-top: 12px;
    font-size: 0.85rem;
    color: var(--text);
  }
  .sidebar-student .pseudo { font-weight: 600; }
  .sidebar-student .class-code { color: var(--muted); font-size: 0.78rem; }

  .sidebar-section {
    margin-top: 22px;
  }
  .sidebar-section-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-weight: 600;
    margin: 0 0 10px;
    padding: 0 6px;
  }
  .sidebar-link {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 0.9rem;
    cursor: pointer;
    text-decoration: none;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    line-height: 1.35;
    transition: background 120ms ease;
  }
  .sidebar-link:hover { background: var(--surface); text-decoration: none; }
  .sidebar-link.active {
    background: var(--sage-soft);
    color: var(--sage);
    font-weight: 500;
  }
  .sidebar-link .num {
    font-variant-numeric: tabular-nums;
    color: var(--muted);
    font-size: 0.78rem;
    min-width: 18px;
  }
  .sidebar-link.active .num { color: var(--sage); }

  /* ---------- Main column ---------- */
  .main {
    grid-column: 2;
    padding: 40px 56px 80px;
    max-width: 100%;
    overflow-x: hidden;
  }
  .reader { max-width: var(--reading-max); margin: 0 auto; }

  /* ---------- Story header ---------- */
  .story-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
  .grammar-tag {
    display: inline-block;
    background: var(--sage-soft);
    color: var(--sage);
    font-size: 0.75rem;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 999px;
    letter-spacing: 0.01em;
  }
  .word-count {
    font-size: 0.78rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .story-title {
    font-family: var(--serif);
    font-size: 2.1rem;
    font-weight: 600;
    line-height: 1.15;
    letter-spacing: -0.01em;
    margin: 4px 0 32px;
  }

  /* ---------- Story body ---------- */
  .story-body { font-size: 1.06rem; line-height: 1.75; }
  .story-body p { margin: 0 0 1.1em; }
  .tts-sentence {
    cursor: pointer;
    border-radius: 3px;
    padding: 1px 2px;
    margin: -1px -2px;
    transition: background 120ms ease, color 120ms ease;
    position: relative;
  }
  .tts-sentence:hover {
    background: var(--sage-soft);
  }
  .tts-sentence.speaking {
    background: var(--sage-soft);
    color: var(--sage);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { background: var(--sage-soft); }
    50% { background: #d6e6da; }
  }

  /* ---------- Section headings ---------- */
  .section {
    margin-top: 56px;
    padding-top: 8px;
  }
  .section-eyebrow {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-weight: 600;
    margin: 0 0 6px;
  }
  .section-title {
    font-family: var(--serif);
    font-size: 1.55rem;
    font-weight: 600;
    margin: 0 0 18px;
    letter-spacing: -0.01em;
  }

  /* ---------- Grammar focus box ---------- */
  .grammar-box {
    border-left: 3px solid var(--sage);
    background: var(--surface);
    padding: 22px 26px;
    border-radius: 0 var(--radius-md) var(--radius-md) 0;
  }
  .grammar-box h3 {
    font-family: var(--serif);
    font-size: 1.2rem;
    margin: 0 0 8px;
    color: var(--sage);
  }
  .grammar-box .explain {
    font-size: 0.95rem;
    color: var(--text);
    margin: 0 0 14px;
    font-style: italic;
  }
  .grammar-box ul {
    list-style: none;
    padding: 0;
    margin: 0 0 16px;
  }
  .grammar-box ul li {
    padding: 5px 0;
    font-size: 0.98rem;
  }
  .grammar-box ul li b {
    color: var(--sage);
    font-weight: 700;
  }
  .grammar-essayez {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed var(--border-strong);
  }
  .grammar-essayez .prompt {
    font-weight: 500;
    margin-bottom: 8px;
  }
  .grammar-essayez .reveal-btn {
    background: transparent;
    border: 1px solid var(--sage);
    color: var(--sage);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 500;
  }
  .grammar-essayez .reveal-btn:hover { background: var(--sage); color: white; }
  .grammar-essayez .answer {
    margin-top: 10px;
    padding: 10px 14px;
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.98rem;
    display: none;
  }
  .grammar-essayez .answer.shown { display: block; }

  /* ---------- Circling cards ---------- */
  .circling-fact { margin-bottom: 28px; }
  .circling-fact h4 {
    font-family: var(--sans);
    font-size: 0.9rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    margin: 0 0 10px;
  }
  .circling-question {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 120ms ease, background 120ms ease;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow-card);
  }
  .circling-question:hover { border-color: var(--sage); background: var(--surface); }
  .circling-question .q-type {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-weight: 600;
    min-width: 80px;
    flex-shrink: 0;
  }
  .circling-question .q-text { flex: 1; font-size: 0.98rem; }
  .circling-question .q-answer {
    color: var(--sage);
    font-weight: 600;
    font-size: 0.92rem;
    opacity: 0;
    transition: opacity 200ms ease;
    margin-left: auto;
    flex-shrink: 0;
  }
  .circling-question.revealed .q-answer { opacity: 1; }
  .circling-question.revealed { border-color: var(--sage); background: var(--sage-soft); }

  /* ---------- Comprehension ---------- */
  .comp-item {
    margin-bottom: 24px;
    padding: 18px 20px;
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-card);
  }
  .comp-item .label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .comp-item .question { font-weight: 500; margin-bottom: 12px; }

  .vf-buttons { display: flex; gap: 10px; margin-bottom: 8px; }
  .vf-btn {
    padding: 8px 22px;
    border: 1.5px solid var(--border-strong);
    background: white;
    border-radius: 999px;
    font-weight: 500;
    color: var(--text);
    transition: all 150ms ease;
  }
  .vf-btn:hover { border-color: var(--sage); }
  .vf-btn.correct { border-color: var(--success); color: var(--success); background: #f0f9f4; }
  .vf-btn.wrong { border-color: var(--error); color: var(--error); background: #fef2f2; }

  .mc-options { display: flex; flex-direction: column; gap: 8px; }
  .mc-option {
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    background: white;
    border-radius: var(--radius-sm);
    text-align: left;
    transition: all 150ms ease;
  }
  .mc-option:hover { border-color: var(--sage); }
  .mc-option.correct { border-color: var(--success); color: var(--success); background: #f0f9f4; }
  .mc-option.wrong { border-color: var(--error); color: var(--error); background: #fef2f2; }
  .mc-option.dim { opacity: 0.5; }

  .open-input {
    width: 100%;
    min-height: 90px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 1rem;
    line-height: 1.5;
    resize: vertical;
    background: white;
  }
  .open-input:focus { outline: none; border-color: var(--sage); }
  .open-confirm {
    margin-top: 8px;
    font-size: 0.85rem;
    color: var(--success);
    display: none;
  }
  .open-confirm.shown { display: block; }

  /* ---------- Sentence ordering exercise ---------- */
  .order-instructions {
    font-size: 0.88rem;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .order-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 60px;
  }
  .order-item {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 10px 14px;
    font-size: 0.96rem;
    cursor: grab;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: var(--shadow-card);
    transition: background 120ms, border-color 120ms;
  }
  .order-item:active { cursor: grabbing; }
  .order-item.dragging { opacity: 0.4; }
  .order-item.over { border-color: var(--sage); background: var(--sage-soft); }
  .order-item .drag-handle {
    color: var(--border-strong);
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .order-item.correct { border-color: var(--success); background: #f0f9f4; }
  .order-item.wrong { border-color: var(--error); background: #fef2f2; }

  /* ---------- Gap-fill exercise ---------- */
  .gap-bank {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px;
    background: var(--surface);
    border-radius: var(--radius-md);
    margin-bottom: 14px;
  }
  .gap-chip {
    background: white;
    border: 1.5px solid var(--border-strong);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 0.92rem;
    cursor: pointer;
    transition: all 120ms;
    user-select: none;
  }
  .gap-chip:hover { border-color: var(--sage); }
  .gap-chip.used { opacity: 0.3; pointer-events: none; }
  .gap-chip.selected { border-color: var(--sage); background: var(--sage-soft); color: var(--sage); font-weight: 600; }
  .gap-sentence {
    padding: 10px 0;
    border-bottom: 1px dashed var(--border);
    font-size: 0.98rem;
    line-height: 1.7;
  }
  .gap-sentence:last-child { border-bottom: none; }
  .gap-blank {
    display: inline-block;
    min-width: 100px;
    padding: 2px 10px;
    margin: 0 3px;
    border-bottom: 2px solid var(--border-strong);
    text-align: center;
    color: var(--muted);
    font-style: italic;
    cursor: pointer;
    transition: all 120ms;
    border-radius: 4px 4px 0 0;
  }
  .gap-blank:hover { background: var(--surface); }
  .gap-blank.active { background: var(--sage-soft); color: var(--sage); border-bottom-color: var(--sage); }
  .gap-blank.filled { color: var(--text); font-style: normal; font-weight: 500; }
  .gap-blank.correct { color: var(--success); border-bottom-color: var(--success); font-weight: 600; }
  .gap-blank.wrong { color: var(--error); border-bottom-color: var(--error); font-weight: 600; }

  /* ---------- Listen-first mode ---------- */
  .mode-toggle {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 0.85rem;
    margin-bottom: 18px;
    cursor: pointer;
    transition: all 120ms;
  }
  .mode-toggle:hover { border-color: var(--sage); }
  .mode-toggle.active-listen { background: var(--sage-soft); border-color: var(--sage); color: var(--sage); }
  .listen-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 16px 20px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-card);
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .listen-card .num-badge {
    background: var(--sage-soft);
    color: var(--sage);
    font-weight: 600;
    font-size: 0.78rem;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .listen-card .listen-controls {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }
  .listen-card .play-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .listen-card .play-btn {
    background: var(--sage);
    color: white;
    border: none;
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 0.85rem;
    font-weight: 500;
  }
  .listen-card .play-btn:hover { background: #3d6849; }
  .listen-card .reveal-btn {
    background: white;
    border: 1.5px solid var(--border-strong);
    color: var(--muted);
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 0.85rem;
  }
  .listen-card .reveal-btn:hover { border-color: var(--sage); color: var(--sage); }
  .listen-card .play-count {
    font-size: 0.78rem;
    color: var(--muted);
    margin-left: 4px;
  }
  .listen-card .revealed-text {
    margin-top: 8px;
    padding: 10px 14px;
    background: var(--surface);
    border-radius: var(--radius-sm);
    font-size: 0.98rem;
    line-height: 1.6;
    display: none;
  }
  .listen-card .revealed-text.shown { display: block; }

  /* ---------- Voice recognition for circling ---------- */
  .circling-question {
    flex-wrap: wrap;
  }
  .mic-btn {
    background: transparent;
    border: 1.5px solid var(--border-strong);
    border-radius: 50%;
    width: 32px;
    height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--muted);
    flex-shrink: 0;
    transition: all 120ms;
    margin-left: 8px;
  }
  .mic-btn:hover { border-color: var(--sage); color: var(--sage); }
  .mic-btn.listening { border-color: var(--sage); background: var(--sage); color: white; animation: pulse-mic 1.2s ease-in-out infinite; }
  @keyframes pulse-mic {
    0%, 100% { box-shadow: 0 0 0 0 rgba(74,124,89,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(74,124,89,0); }
  }
  .mic-feedback {
    flex-basis: 100%;
    margin-top: 8px;
    padding: 8px 12px;
    background: var(--surface);
    border-radius: var(--radius-sm);
    font-size: 0.85rem;
    color: var(--muted);
    display: none;
  }
  .mic-feedback.shown { display: block; }
  .mic-feedback.match { color: var(--success); background: #f0f9f4; }
  .mic-feedback.miss { color: var(--error); background: #fef2f2; }

  /* ---------- Game mode ---------- */
  .game-shell {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 28px 60px;
  }
  .game-shell h1 {
    font-family: var(--serif);
    font-size: 2rem;
    margin-bottom: 8px;
  }
  .game-eyebrow {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-weight: 600;
    margin: 0 0 12px;
  }
  .game-panel {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px;
    margin-bottom: 22px;
    box-shadow: var(--shadow-card);
  }
  .game-banner-sentence {
    background: var(--sage-soft);
    border-left: 4px solid var(--sage);
    border-radius: 0 var(--radius-md) var(--radius-md) 0;
    padding: 28px 32px;
    font-family: var(--serif);
    font-size: 1.7rem;
    line-height: 1.4;
    color: var(--text);
    margin-bottom: 22px;
  }
  .game-banner-sentence.huge {
    font-size: 2.4rem;
    padding: 40px 44px;
  }
  .game-stats {
    display: flex;
    gap: 28px;
    align-items: center;
    flex-wrap: wrap;
    padding: 14px 0;
  }
  .game-stat {
    display: flex;
    flex-direction: column;
  }
  .game-stat .num {
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 600;
    line-height: 1;
  }
  .game-stat .label {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .game-controls {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .game-phase-badge {
    display: inline-block;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: var(--beige);
    color: white;
    margin-bottom: 14px;
  }
  .game-phase-badge.drawing { background: var(--sage); }
  .game-phase-badge.voting { background: var(--beige); }
  .game-phase-badge.results { background: #6b7280; }
  .vote-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }
  .vote-card {
    border: 2px solid var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
    cursor: pointer;
    background: white;
    transition: transform 150ms ease, border-color 150ms ease;
    position: relative;
  }
  .vote-card:hover { border-color: var(--beige); transform: translateY(-2px); }
  .vote-card.starred {
    border-color: var(--beige);
    box-shadow: 0 0 0 3px rgba(212,165,116,0.25);
  }
  .vote-card img { display: block; width: 100%; height: 200px; object-fit: contain; background: white; }
  .vote-star-count {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--beige);
    color: white;
    border-radius: 999px;
    padding: 3px 10px;
    font-weight: 700;
    font-size: 0.85rem;
    display: none;
  }
  .vote-card.show-stars .vote-star-count { display: block; }
  .vote-card .pseudo-row {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    font-size: 0.85rem;
    color: var(--muted);
  }
  .vote-card .pseudo-row.hidden { color: transparent; }
  .vote-card .own-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: var(--surface);
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 0.72rem;
    color: var(--muted);
    border: 1px solid var(--border);
    font-weight: 500;
    pointer-events: none;
  }
  .game-link-box {
    background: var(--surface);
    border-radius: var(--radius-md);
    padding: 16px 20px;
    margin: 14px 0;
    font-family: monospace;
    font-size: 0.95rem;
    word-break: break-all;
    border: 1px dashed var(--border-strong);
  }
  @media (max-width: 768px) {
    .vote-grid { grid-template-columns: 1fr 1fr; }
    .game-banner-sentence.huge { font-size: 1.5rem; padding: 24px; }
    .game-shell { padding: 20px 16px 50px; }
  }

  /* ---------- Game timer (drawing countdown + vote spam countdown) ---------- */
  .game-timer {
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 200;
    background: white;
    border: 2px solid var(--sage);
    border-radius: var(--radius-lg);
    padding: 10px 18px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    font-family: var(--serif);
    display: flex;
    align-items: baseline;
    gap: 8px;
    min-width: 110px;
    transition: border-color 200ms, color 200ms, transform 100ms;
  }
  .game-timer .clock-num {
    font-size: 2rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .game-timer .clock-unit {
    font-size: 0.85rem;
    color: var(--muted);
  }
  .game-timer.warn {
    border-color: var(--beige);
    color: var(--beige);
  }
  .game-timer.urgent {
    border-color: var(--error);
    color: var(--error);
    animation: timer-pulse 0.7s ease-in-out infinite;
  }
  @keyframes timer-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }
  .game-timer.done {
    border-color: var(--border-strong);
    color: var(--muted);
  }
  @media (max-width: 768px) {
    .game-timer { top: 12px; right: 12px; padding: 8px 14px; min-width: 90px; }
    .game-timer .clock-num { font-size: 1.5rem; }
  }

  /* ---------- Spam-mode polish ---------- */
  .vote-card.spam-tap .vote-star-count {
    animation: star-pop 0.22s ease-out;
  }
  @keyframes star-pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.45); background: #d4a574; color: white; }
    100% { transform: scale(1); }
  }
  .spam-total-banner {
    background: var(--beige);
    color: white;
    border-radius: var(--radius-md);
    padding: 14px 22px;
    margin-bottom: 18px;
    font-family: var(--serif);
    font-size: 1.3rem;
    text-align: center;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
  }
  .spam-total-banner .total-num {
    font-size: 2.2rem;
    font-variant-numeric: tabular-nums;
    transition: transform 100ms;
  }
  .spam-total-banner .total-num.bump {
    transform: scale(1.18);
  }
  .spam-locked-overlay {
    margin-top: 14px;
    padding: 14px 18px;
    background: var(--surface);
    border-radius: var(--radius-md);
    text-align: center;
    color: var(--muted);
    font-size: 0.95rem;
  }
  /* In voting mode, the cursor changes to indicate tap-spam */
  .vote-grid.spam-mode .vote-card:not(.own) { cursor: pointer; }
  .vote-grid.spam-mode .vote-card.locked { cursor: not-allowed; opacity: 0.7; }

  /* ---------- Sentence Jam ---------- */
  .jam-panel {
    background: linear-gradient(180deg, #fdf6ea 0%, #faf3df 100%);
    border: 1px solid #ecd9b4;
    border-radius: var(--radius-lg);
    padding: 28px;
    margin-bottom: 22px;
    box-shadow: var(--shadow-card);
    position: relative;
  }
  .jam-eyebrow {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--beige);
    font-family: var(--serif);
    font-style: italic;
    font-weight: 600;
    margin: 0 0 6px;
  }
  .jam-eyebrow::before {
    content: "⚡ ";
    font-style: normal;
  }
  .jam-english {
    font-family: var(--serif);
    font-size: 1.5rem;
    font-style: italic;
    color: var(--text);
    line-height: 1.4;
    margin: 0 0 22px;
    padding: 12px 18px;
    background: white;
    border-left: 3px solid var(--beige);
    border-radius: 0 var(--radius-md) var(--radius-md) 0;
  }
  .jam-instructions {
    font-size: 0.92rem;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .jam-chunk-bank {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 22px;
    padding: 14px;
    background: rgba(255,255,255,0.6);
    border-radius: var(--radius-md);
    min-height: 60px;
  }
  .jam-chunk {
    background: white;
    border: 2px solid #d4a574;
    border-radius: var(--radius-md);
    padding: 10px 18px;
    font-size: 1.02rem;
    cursor: grab;
    user-select: none;
    transition: all 120ms;
    box-shadow: var(--shadow-card);
    font-family: var(--sans);
  }
  .jam-chunk:hover { transform: translateY(-1px); border-color: var(--beige); box-shadow: 0 2px 6px rgba(212,165,116,0.3); }
  .jam-chunk:active { cursor: grabbing; }
  .jam-chunk.dragging { opacity: 0.4; }
  .jam-chunk.placed {
    background: var(--beige);
    color: white;
    border-color: var(--beige);
  }
  .jam-slots {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 18px;
    min-height: 60px;
    padding: 14px;
    background: white;
    border: 2px dashed #d4a574;
    border-radius: var(--radius-md);
  }
  .jam-slots:empty::before {
    content: "Glisse les chunks ici dans le bon ordre…";
    color: var(--muted);
    font-style: italic;
    align-self: center;
    margin: auto;
  }
  .jam-slots .jam-chunk { cursor: pointer; }
  .jam-actions {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .jam-status {
    font-size: 0.92rem;
    margin-left: auto;
    color: var(--muted);
  }
  .jam-status.correct { color: var(--success); font-weight: 600; }
  .jam-status.wrong { color: var(--error); font-weight: 600; }

  /* Leaderboard (jam round + cumulative) */
  .jam-leaderboard {
    background: white;
    border: 1px solid #ecd9b4;
    border-radius: var(--radius-md);
    padding: 18px 22px;
    margin-top: 18px;
  }
  .jam-leaderboard h4 {
    font-family: var(--serif);
    font-size: 1.05rem;
    color: var(--beige);
    margin: 0 0 12px;
  }
  .lb-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 8px 0;
    border-bottom: 1px dashed var(--border);
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank {
    font-family: var(--serif);
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--muted);
    min-width: 32px;
    text-align: center;
  }
  .lb-row.gold .lb-rank { color: #d4a574; }
  .lb-row.silver .lb-rank { color: #9ca3af; }
  .lb-row.bronze .lb-rank { color: #b87333; }
  .lb-pseudo { flex: 1; font-weight: 500; }
  .lb-time { font-variant-numeric: tabular-nums; color: var(--muted); font-size: 0.9rem; }
  .lb-status { font-size: 0.85rem; }
  .lb-status.correct { color: var(--success); }
  .lb-status.wrong { color: var(--error); }

  /* End-of-game cumulative leaderboards */
  .cumulative-leaderboards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px;
    margin-top: 22px;
  }
  @media (max-width: 768px) {
    .cumulative-leaderboards { grid-template-columns: 1fr; }
    .jam-english { font-size: 1.15rem; padding: 10px 14px; }
  }

  /* ---------- Music player widget ---------- */
  .music-widget {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .music-widget .mw-play {
    background: var(--sage);
    color: white;
    border: none;
    border-radius: 50%;
    width: 38px;
    height: 38px;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .music-widget .mw-play:hover { background: #3d6849; }
  .music-widget .mw-label {
    font-size: 0.85rem;
    color: var(--muted);
    min-width: 80px;
  }
  .music-widget .mw-vol-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 180px;
  }
  .music-widget .mw-vol-wrap input[type="range"] {
    flex: 1;
    accent-color: var(--sage);
  }
  .music-widget .mw-vol-icon {
    font-size: 1rem;
    color: var(--muted);
    width: 22px;
    text-align: center;
  }
  .music-widget .mw-time {
    font-variant-numeric: tabular-nums;
    font-size: 0.82rem;
    color: var(--muted);
    min-width: 78px;
    text-align: right;
  }
  .music-widget.playing .mw-label::before {
    content: "♪ ";
    color: var(--sage);
  }

  /* Select-all / mid-game add-story */
  .picker-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .picker-actions button {
    font-size: 0.8rem;
    padding: 4px 10px;
    background: white;
    border: 1px solid var(--border-strong);
    border-radius: 999px;
    cursor: pointer;
    color: var(--muted);
  }
  .picker-actions button:hover { border-color: var(--sage); color: var(--sage); }
  .picker-actions .count-label {
    font-size: 0.8rem;
    color: var(--muted);
    margin-left: auto;
    font-variant-numeric: tabular-nums;
  }
  .add-story-panel {
    background: var(--surface);
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius-md);
    padding: 18px;
    margin-top: 14px;
    display: none;
  }
  .add-story-panel.shown { display: block; }
  .add-story-panel select { padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border-strong); margin-bottom: 12px; width: 100%; max-width: 400px; }
  .add-story-panel .add-picker { max-height: 280px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; padding: 12px; background: white; display: none; }
  .add-story-panel .add-picker.shown { display: block; }

  /* ---------- Engagement enhancements ---------- */
  /* Mode toggle button states */
  #btn-mode-toggle.listen-mode {
    background: #fdf6ea;
    border-color: #d4a574;
    color: #b87333;
  }
  /* Submission count indicator (shown to students during drawing phase) */
  .submission-count {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--sage-soft);
    color: var(--sage);
    border-radius: 999px;
    padding: 4px 12px;
    font-size: 0.85rem;
    font-weight: 500;
    margin-top: 8px;
    transition: transform 200ms;
  }
  .submission-count.bump {
    transform: scale(1.08);
  }
  /* Listening mode banner styling */
  .listening-banner {
    background: linear-gradient(180deg, #fdf6ea 0%, #faf3df 100%) !important;
    border: 2px dashed #d4a574 !important;
    color: #b87333 !important;
  }
  /* Winning-drawing callout */
  .winner-callout {
    background: linear-gradient(180deg, #fdf6ea 0%, #faf3df 100%);
    border: 2px solid #d4a574;
    border-radius: var(--radius-lg);
    padding: 22px;
    margin-bottom: 22px;
    text-align: center;
    animation: winner-pop 600ms ease-out;
    box-shadow: var(--shadow-card);
  }
  @keyframes winner-pop {
    0% { transform: scale(0.85); opacity: 0; }
    60% { transform: scale(1.04); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .winner-callout h2 {
    font-family: var(--serif);
    color: #b87333;
    margin: 0 0 14px;
    font-size: 1.5rem;
  }
  .winner-callout img {
    max-width: 280px;
    max-height: 210px;
    border-radius: var(--radius-md);
    border: 3px solid #d4a574;
    background: white;
    margin: 0 auto 12px;
    display: block;
  }
  .winner-callout .winner-info {
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--text);
  }
  .winner-callout .winner-stars {
    color: #d4a574;
    font-size: 1.1rem;
  }
  /* Cascade pseudonym reveal in results phase */
  @keyframes reveal-cascade {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .vote-card.show-stars.cascade-reveal .pseudo-row {
    animation: reveal-cascade 400ms ease-out backwards;
  }
  /* Per-student end-of-game stats card */
  .personal-stats {
    background: linear-gradient(180deg, white 0%, var(--sage-soft) 100%);
    border: 1px solid var(--sage);
    margin-bottom: 22px;
  }
  .personal-stats h3 {
    color: var(--sage);
    margin: 0 0 12px;
    font-family: var(--serif);
  }
  .personal-stats .stat-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 8px 0;
    border-bottom: 1px dashed var(--border);
    font-size: 1.05rem;
  }
  .personal-stats .stat-row:last-child { border-bottom: none; }
  .personal-stats .stat-icon { font-size: 1.4rem; width: 32px; text-align: center; }
  .personal-stats .stat-num { font-weight: 600; color: var(--sage); font-variant-numeric: tabular-nums; }

  /* Custom color input — sits next to the swatches and lets students pick any color */
  .custom-color-input {
    width: 28px;
    height: 28px;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    cursor: pointer;
    padding: 0;
    background: none;
    flex-shrink: 0;
    align-self: center;
  }
  .custom-color-input::-webkit-color-swatch-wrapper { padding: 0; }
  .custom-color-input::-webkit-color-swatch { border: none; border-radius: 4px; }
  .custom-color-input::-moz-color-swatch { border: none; border-radius: 4px; }

  /* ---------- Roster picker (student name selection) ---------- */
  .roster-picker {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px 22px;
    text-align: center;
    box-shadow: var(--shadow-card);
  }
  .roster-title {
    font-family: var(--serif);
    font-size: 1.6rem;
    color: var(--text);
    margin: 0 0 8px;
  }
  .roster-hint {
    color: var(--muted);
    font-size: 0.9rem;
    margin: 0 auto 22px;
    max-width: 500px;
  }
  .roster-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
    max-width: 700px;
    margin: 0 auto;
  }
  .roster-btn {
    padding: 14px 10px;
    background: white;
    border: 2px solid var(--sage);
    color: var(--sage);
    border-radius: 8px;
    font-size: 1.05rem;
    font-weight: 500;
    font-family: var(--sans);
    cursor: pointer;
    transition: all 120ms;
  }
  .roster-btn:hover:not(:disabled) {
    background: var(--sage);
    color: white;
    transform: translateY(-1px);
  }
  .roster-btn:active:not(:disabled) { transform: translateY(0); }
  .roster-btn.claimed {
    background: var(--surface);
    border-color: var(--border);
    color: var(--muted);
    cursor: not-allowed;
  }
  .roster-btn .check {
    color: var(--success);
    margin-left: 4px;
  }

  /* Teacher attendance / release panel */
  .attendance-panel {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 14px 18px;
    margin-top: 14px;
  }
  .attendance-panel h4 {
    font-size: 0.85rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 0 0 8px;
    font-weight: 600;
  }
  .attendance-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .attendance-chip {
    background: var(--sage-soft);
    color: var(--sage);
    border-radius: 999px;
    padding: 4px 10px 4px 12px;
    font-size: 0.85rem;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .attendance-chip .release-btn {
    background: none;
    border: none;
    color: var(--sage);
    cursor: pointer;
    font-size: 1.05rem;
    line-height: 1;
    padding: 0;
    opacity: 0.55;
    border-radius: 50%;
    width: 18px; height: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .attendance-chip .release-btn:hover {
    background: var(--error);
    color: white;
    opacity: 1;
  }
  .attendance-empty {
    color: var(--muted);
    font-size: 0.85rem;
    font-style: italic;
  }

  /* Small "changer" escape hatch on the student page */
  .change-name-link {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.7rem;
    font-family: var(--sans);
    cursor: pointer;
    text-decoration: underline;
    padding: 0 4px 0 8px;
    margin-left: 4px;
    text-transform: none;
    letter-spacing: 0;
  }
  .change-name-link:hover { color: var(--sage); }

  /* ---------- Drawing canvas ---------- */
  .drawing-prompt {
    background: var(--surface);
    border-radius: var(--radius-md);
    padding: 16px 20px;
    margin-bottom: 14px;
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.05rem;
  }
  .canvas-shell {
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 14px;
    background: white;
    box-shadow: var(--shadow-card);
  }
  .canvas-toolbar {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .tool-group { display: flex; align-items: center; gap: 6px; }
  .tool-group .label {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-right: 4px;
  }
  .tool-btn {
    padding: 6px 10px;
    border: 1px solid var(--border-strong);
    background: white;
    border-radius: var(--radius-sm);
    font-size: 0.85rem;
    color: var(--text);
  }
  .tool-btn.active { border-color: var(--sage); background: var(--sage-soft); color: var(--sage); font-weight: 600; }
  .tool-btn:hover { border-color: var(--sage); }
  .color-swatch {
    width: 24px;
    height: 24px;
    border: 2px solid white;
    box-shadow: 0 0 0 1px var(--border-strong);
    border-radius: 50%;
    cursor: pointer;
    padding: 0;
  }
  .color-swatch.active { box-shadow: 0 0 0 2px var(--sage); }
  #drawing-canvas {
    display: block;
    width: 100%;
    max-width: 600px;
    height: 400px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: crosshair;
    background: white;
    touch-action: none;
  }
  .canvas-actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    align-items: center;
    flex-wrap: wrap;
  }

  /* ---------- Buttons ---------- */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    border-radius: 999px;
    font-weight: 500;
    font-size: 0.95rem;
    border: 1.5px solid transparent;
    transition: all 150ms ease;
    text-decoration: none;
  }
  .btn-primary { background: var(--sage); color: white; border-color: var(--sage); }
  .btn-primary:hover { background: #3d6849; border-color: #3d6849; text-decoration: none; }
  .btn-secondary { background: white; color: var(--sage); border-color: var(--sage); }
  .btn-secondary:hover { background: var(--sage-soft); text-decoration: none; }
  .btn-ghost { background: transparent; color: var(--muted); border-color: transparent; }
  .btn-ghost:hover { color: var(--text); background: var(--surface); }

  /* ---------- Chunks preview list ---------- */
  .chunks-preview {
    background: var(--surface);
    border-radius: var(--radius-md);
    padding: 18px 22px;
  }
  .chunk-line {
    font-family: 'DM Sans', monospace;
    font-size: 0.95rem;
    padding: 4px 0;
    color: var(--text);
    line-height: 1.5;
    cursor: pointer;
    border-radius: 3px;
    padding-left: 6px;
    margin-left: -6px;
    transition: background 120ms ease;
  }
  .chunk-line:hover { background: white; }
  .chunk-line .en { color: var(--muted); }
  .chunk-line .eq { color: var(--border-strong); margin: 0 6px; }
  .chunk-line .fr { color: var(--text); font-weight: 500; }
  .chunks-preview .more {
    margin-top: 12px;
    display: inline-block;
    font-size: 0.88rem;
    color: var(--sage);
    font-weight: 500;
  }

  /* ---------- Glossary view ---------- */
  .glossary-filters {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .glossary-filters input,
  .glossary-filters select {

// Auto-generate chunks for any French sentence by grouping articles+nouns,
// prepositions+articles+nouns, possessives+nouns, and auxiliary+participle pairs.
// Targets 4-7 chunks. Used as fallback when no hand-authored jam data exists.
function autoSplitFrenchSentence(sentence) {
  if (!sentence) return [];
  // Tokenize: words (with apostrophes and accented chars) + trailing punct, OR standalone punctuation
  const tokens = sentence.match(/[A-Za-zÀ-ÿ0-9'\-]+[.,;:!?»…\)]*|[«—–\(]/g);
  if (!tokens || tokens.length === 0) return [sentence];

  const strip = s => s.toLowerCase().replace(/[.,;:!?»…\(\)]/g, '');
  const ARTICLE = /^(le|la|l|les|un|une|des|du|au|aux)$/;
  const POSSESS = /^(mon|ma|mes|ton|ta|tes|son|sa|ses|notre|nos|votre|vos|leur|leurs|ce|cet|cette|ces)$/;
  const PREP = /^(à|de|d|dans|sur|sous|avec|pour|sans|chez|par|vers|entre|contre|devant|derrière|après|avant)$/;
  const AUX = /^(a|as|ai|avons|avez|ont|est|es|sommes|êtes|sont|était|étais|étaient|étions|étiez|sera|seront|aura|auront|avait|avaient|avais|avions|aviez)$/;
  // Past participles end in é, ée, és, ées, i, ie, is, ies, u, ue, us, ues, ert, erte, etc.
  const PARTICIPLE = /^[a-zà-ÿ'\-]*(é|ée|és|ées|i|ie|is|ies|it|ites|u|ue|us|ues|ert|erte|erts|ertes)$/;

  const out = [];
  let i = 0;
  while (i < tokens.length) {
    const t = tokens[i];
    const t1 = tokens[i + 1];
    const t2 = tokens[i + 2];
    const ts = strip(t);
    const t1s = t1 ? strip(t1) : '';
    const t2s = t2 ? strip(t2) : '';

    // "il y a" idiom
    if (ts === 'il' && t1s === 'y' && t2s === 'a') {
      out.push(t + ' ' + t1 + ' ' + t2);
      i += 3; continue;
    }
    // Preposition + article + noun
    if (PREP.test(ts) && t1 && ARTICLE.test(t1s) && t2) {
      out.push(t + ' ' + t1 + ' ' + t2);
      i += 3; continue;
    }
    // Preposition + possessive + noun
    if (PREP.test(ts) && t1 && POSSESS.test(t1s) && t2) {
      out.push(t + ' ' + t1 + ' ' + t2);
      i += 3; continue;
    }
    // Preposition + bare noun (no article between)
    if (PREP.test(ts) && t1) {
      out.push(t + ' ' + t1);
      i += 2; continue;
    }
    // Article + noun
    if (ARTICLE.test(ts) && t1) {
      out.push(t + ' ' + t1);
      i += 2; continue;
    }
    // Possessive + noun
    if (POSSESS.test(ts) && t1) {
      out.push(t + ' ' + t1);
      i += 2; continue;
    }
    // Auxiliary + participle
    if (AUX.test(ts) && t1 && PARTICIPLE.test(t1s)) {
      out.push(t + ' ' + t1);
      i += 2; continue;
    }
    // Default: single token
    out.push(t);
    i++;
  }

  // Merge to 4-7 chunks: while > 7, merge shortest adjacent pair
  while (out.length > 7) {
    let minIdx = 0, minLen = Infinity;
    for (let j = 0; j < out.length - 1; j++) {
      const combined = out[j].length + out[j + 1].length;
      if (combined < minLen) { minLen = combined; minIdx = j; }
    }
    out[minIdx] = out[minIdx] + ' ' + out[minIdx + 1];
    out.splice(minIdx + 1, 1);
  }
  // If under 3 chunks, leave alone (very short sentences don't need splitting)
  return out;
}

// Lookup helper — exact match first, then substring fallback, then auto-generate
function findJamData(sentence) {
  if (!sentence) return null;
  let hit = JAM_SENTENCES.find(j => j.fr === sentence);
  if (hit) return hit;
  hit = JAM_SENTENCES.find(j => sentence.includes(j.fr));
  if (hit) return hit;
  hit = JAM_SENTENCES.find(j => j.fr.includes(sentence));
  if (hit) return hit;
  // Fallback: auto-generate from the sentence itself
  const chunks = autoSplitFrenchSentence(sentence);
  if (chunks.length < 3) return null; // too short to be a meaningful jam
  // Pull cached translation from localStorage if a previous translation succeeded
  const cachedEn = localStorage.getItem('histoiresFII.tr:' + sentence);
  return { fr: sentence, en: cachedEn || null, chunks, autoGenerated: true };
}

function scoreSentence(sentence) {
  if (!sentence) return 0;
  let score = 0;
  // Tokenize the lowercase sentence, then expand elisions (l'eau → l, eau)
  const rawTokens = sentence.toLowerCase().match(/[a-zà-ÿ'\-]+/g) || [];
  const tokens = new Set();
  rawTokens.forEach(t => {
    tokens.add(t);
    if (t.includes("'")) t.split("'").forEach(p => { if (p) tokens.add(p); });
  });
  // Concrete content tally
  tokens.forEach(t => { if (DRAWABLE_KEYWORDS.has(t)) score += 1; });
  // Characters (preserve case in original)
  DRAWABLE_CHARACTERS.forEach(name => { if (sentence.includes(name)) score += 1; });
  // Length sweet spot bonus / penalty
  const len = sentence.length;
  if (len >= 40 && len <= 110) score += 1;
  if (len < 25 || len > 130) score -= 1;
  return score;
}

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  // Ensure at least one swap from original order
  if (arr.length > 1 && a.every((v, i) => v === arr[i])) [a[0], a[1]] = [a[1], a[0]];
  return a;
}

// Translate FR → EN via MyMemory free API. Caches per-device in localStorage.
// Returns null on failure or if translation equals input. Used as scaffolding
// for auto-generated jam sentences (sentences not in JAM_SENTENCES corpus).
async function translateFrToEn(french) {
  if (!french || typeof french !== 'string') return null;
  const cacheKey = 'histoiresFII.tr:' + french;
  const cached = localStorage.getItem(cacheKey);
  if (cached) return cached;
  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(french)}&langpair=fr|en`;
    const ctrl = new AbortController();
    const timeoutId = setTimeout(() => ctrl.abort(), 4000);
    const resp = await fetch(url, { signal: ctrl.signal });
    clearTimeout(timeoutId);
    if (!resp.ok) return null;
    const data = await resp.json();
    const en = data?.responseData?.translatedText;
    if (!en) return null;
    // Quality filter: discard if "translation" is identical to source
    const norm = s => s.toLowerCase().replace(/[^a-zà-ÿ\s]/gi, '').trim().replace(/\s+/g, ' ');
    if (norm(en) === norm(french)) return null;
    localStorage.setItem(cacheKey, en);
    return en;
  } catch (err) {
    console.warn("translation failed for:", french, err);
    return null;
  }
}

// ============================================================
// localStorage helpers
// ============================================================
const LS_KEY = "histoires_fii_v1";
function lsGet() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; }
}
function lsSet(obj) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(obj)); } catch (e) {}
}
function lsPatch(patch) {
  const data = lsGet();
  Object.assign(data, patch);
  lsSet(data);
}
function lsGetStoryState(storyId) {
  const data = lsGet();
  return (data.stories && data.stories[storyId]) || {};
}
function lsSetStoryState(storyId, patch) {
  const data = lsGet();
  data.stories = data.stories || {};
  data.stories[storyId] = Object.assign({}, data.stories[storyId] || {}, patch);
  lsSet(data);
}

// ============================================================
// TTS (Web Speech API)
// ============================================================
let speakingEl = null;
function speak(text, el) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  if (speakingEl) speakingEl.classList.remove('speaking');
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'fr-FR';
  u.rate = 0.85;
  if (el) {
    el.classList.add('speaking');
    speakingEl = el;
    u.onend = u.onerror = () => { el.classList.remove('speaking'); if (speakingEl === el) speakingEl = null; };
  }
  window.speechSynthesis.speak(u);
}

// Sentence-wrapped TTS rendering
// ============================================================
function renderTTSParagraphs(paragraphs) {
  const wrap = document.createElement('div');
  wrap.className = 'story-body';
  paragraphs.forEach(par => {
    const p = document.createElement('p');
    par.forEach((sentence, idx) => {
      const span = document.createElement('span');
      span.className = 'tts-sentence';
      span.textContent = sentence;
      span.addEventListener('click', () => speak(sentence, span));
      p.appendChild(span);
      if (idx < par.length - 1) p.appendChild(document.createTextNode(' '));
    });
    wrap.appendChild(p);
  });
  return wrap;
}

function countWords(paragraphs) {
  return paragraphs.flat().join(' ').split(/\s+/).filter(Boolean).length;
}

function renderStory(storyId) {
  const story = STORIES.find(s => s.id === storyId);
  if (!story) { main.innerHTML = '<p>Histoire introuvable.</p>'; return; }
  const state = lsGetStoryState(storyId);

  const reader = document.createElement('div');
  reader.className = 'reader';
  main.appendChild(reader);

  // Header
  const meta = document.createElement('div');
  meta.className = 'story-meta';
  meta.innerHTML = `
    <span class="grammar-tag">${story.grammarTag}</span>
    <span class="word-count">${countWords(story.paragraphs)} mots</span>
  `;
  reader.appendChild(meta);

  const h1 = document.createElement('h1');
  h1.className = 'story-title';
  h1.textContent = story.title;
  reader.appendChild(h1);

  // Listen-first toggle
  const listenMode = !!state.listenMode;
  const toggle = document.createElement('button');
  toggle.className = 'mode-toggle' + (listenMode ? ' active-listen' : '');
  toggle.innerHTML = listenMode
    ? '<span>◉</span> Mode écoute (texte caché) — toucher pour montrer le texte'
    : '<span>○</span> Mode lecture — toucher pour passer en mode écoute';

    lsSetStoryState(story.id, { listenMode: !listenMode });
    showView('story', story.id);
  });
  reader.appendChild(toggle);

  // Story body — either reading mode (TTS spans) or listen-first cards
  if (listenMode) {
    reader.appendChild(renderListenFirst(story));
  } else {
    reader.appendChild(renderTTSParagraphs(story.paragraphs));
  }

  // Grammar focus
  reader.appendChild(renderGrammarBox(story));

  // Circling
  reader.appendChild(renderCircling(story));

  // Comprehension
  reader.appendChild(renderComprehension(story, state));

  // Drawing
  reader.appendChild(renderDrawing(story, state));

  // Chunks preview
  reader.appendChild(renderChunkPreview(story));
}

function renderListenFirst(story) {
  const wrap = document.createElement('div');
  wrap.className = 'listen-mode';

  // Flatten paragraphs into sentence groups by paragraph
  story.paragraphs.forEach((par, parIdx) => {
    if (par.length === 0) return;
    // Check whether this is a chapter heading (single short sentence starting with "Chapitre" or "Première"/"Deuxième" etc.)
    const isHeading = par.length === 1 && /^(Chapitre|Première|Deuxième|Troisième)/.test(par[0]);
    if (isHeading) {
      const h = document.createElement('h3');
      h.style.cssText = "font-family: var(--serif); font-size: 1.2rem; color: var(--sage); margin: 28px 0 14px;";
      h.textContent = par[0];
      wrap.appendChild(h);
      return;
    }

    const card = document.createElement('div');
    card.className = 'listen-card';
    card.dataset.parIdx = parIdx;
    const fullText = par.join(' ');
    card.innerHTML = `
      <div class="num-badge">${parIdx + 1}</div>
      <div class="listen-controls">
        <div class="play-row">
          <button class="play-btn" data-action="play">▶ Écouter</button>
          <button class="play-btn" data-action="slow" style="background:var(--beige);">▶ Plus lent</button>
          <button class="reveal-btn" data-action="reveal">Afficher le texte</button>
          <span class="play-count">Écouté <b>0</b> fois</span>
        </div>
        <div class="revealed-text"></div>
      </div>
    `;
    const playBtn = card.querySelector('[data-action="play"]');
    const slowBtn = card.querySelector('[data-action="slow"]');
    const revealBtn = card.querySelector('[data-action="reveal"]');
    const countEl = card.querySelector('.play-count b');
    const revealed = card.querySelector('.revealed-text');
    let plays = 0;
    playBtn.addEventListener('click', () => { plays++; countEl.textContent = plays; speakTextWithRate(fullText, 0.85, card); });
    slowBtn.addEventListener('click', () => { plays++; countEl.textContent = plays; speakTextWithRate(fullText, 0.7, card); });
    revealBtn.addEventListener('click', () => {
      revealed.classList.toggle('shown');
      if (revealed.classList.contains('shown')) {
        // Build TTS-clickable text
        revealed.innerHTML = '';
        par.forEach((sentence, sIdx) => {
          const span = document.createElement('span');
          span.className = 'tts-sentence';
          span.textContent = sentence;
          span.addEventListener('click', () => speak(sentence, span));
          revealed.appendChild(span);
          if (sIdx < par.length - 1) revealed.appendChild(document.createTextNode(' '));
        });
        revealBtn.textContent = 'Cacher le texte';
      } else {
        revealBtn.textContent = 'Afficher le texte';
      }
    });
    wrap.appendChild(card);
  });
  return wrap;
}

// Variant of speak() with adjustable rate

  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  if (speakingEl) speakingEl.classList.remove('speaking');
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'fr-FR';
  u.rate = rate;
  window.speechSynthesis.speak(u);
}

function renderCircling(story) {
  const sec = document.createElement('section');
  sec.className = 'section';
  sec.innerHTML = `<p class="section-eyebrow">Pratique</p><h2 class="section-title">Circling — questions et réponses</h2>`;
  const speechRec = getSpeechRecognition();
  if (!speechRec) {
    const note = document.createElement('div');
    note.style.cssText = "font-size:0.82rem; color:var(--muted); margin-bottom:14px; padding:8px 12px; background:var(--surface); border-radius:6px;";
    note.textContent = "Astuce : ouvre ce module dans Chrome ou Edge pour utiliser le micro et pratiquer la prononciation.";
    sec.appendChild(note);
  }
  story.circling.forEach((fact, i) => {
    const factDiv = document.createElement('div');
    factDiv.className = 'circling-fact';
    factDiv.innerHTML = `<h4>Fait ${i + 1} · ${fact.fact}</h4>`;
    fact.questions.forEach(q => {
      const card = document.createElement('div');
      card.className = 'circling-question';
      const targetForVoice = q.type === "Énoncé" ? q.text : (q.answer === "OUI" || q.answer === "NON" ? q.answer : q.answer);
      card.innerHTML = `
        <span class="q-type">${q.type}</span>
        <span class="q-text">${q.text}</span>
        <span class="q-answer">${q.answer}</span>
        ${speechRec ? '<button class="mic-btn" title="Parle ta réponse">🎤</button>' : ''}
        <div class="mic-feedback"></div>
      `;
      // Click anywhere in card (not on mic) → reveal text + speak the question
      card.addEventListener('click', e => {
        if (e.target.closest('.mic-btn')) return;
        card.classList.add('revealed');
        speak(q.text, card);
      });
      // Mic
      if (speechRec) {
        const micBtn = card.querySelector('.mic-btn');
        const feedback = card.querySelector('.mic-feedback');
        let misses = 0;
        micBtn.addEventListener('click', ev => {
          ev.stopPropagation();
          if (micBtn.classList.contains('listening')) return;
          micBtn.classList.add('listening');
          feedback.classList.remove('shown', 'match', 'miss');
          feedback.textContent = 'À toi de parler…';
          feedback.classList.add('shown');
          const rec = new speechRec();
          rec.lang = 'fr-FR';
          rec.interimResults = false;
          rec.maxAlternatives = 3;
          rec.onresult = (event) => {
            const alts = Array.from(event.results[0]).map(r => r.transcript);
            const ok = alts.some(t => fuzzyMatch(t, targetForVoice));
            if (ok) {
              feedback.textContent = `J'ai entendu : « ${alts[0]} » — bien joué !`;
              feedback.classList.add('match');
              card.classList.add('revealed');
            } else {
              misses++;
              feedback.textContent = `J'ai entendu : « ${alts[0] || '...'} ». ${misses >= 2 ? 'Voici la réponse.' : 'Essaie encore.'}`;
              feedback.classList.add('miss');
              if (misses >= 2) card.classList.add('revealed');
            }
            micBtn.classList.remove('listening');
          };
          rec.onerror = () => {
            feedback.textContent = "Je n'ai pas pu écouter. Vérifie le micro et réessaie.";
            feedback.classList.add('miss');
            micBtn.classList.remove('listening');
          };
          rec.onend = () => micBtn.classList.remove('listening');
          try { rec.start(); } catch (err) { feedback.textContent = "Micro indisponible."; feedback.classList.add('miss'); micBtn.classList.remove('listening'); }
        });
      }
      factDiv.appendChild(card);
    });
    sec.appendChild(factDiv);
  });
  return sec;
}

// Fuzzy match for French speech: normalize, then word-set overlap
function normalizeForMatch(s) {
  return (s || '')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')   // strip accents
    .replace(/[^\w\sàâäéèêëîïôöùûüç]/gi, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}
function fuzzyMatch(spoken, target) {
  const s = normalizeForMatch(spoken);
  const t = normalizeForMatch(target);
  if (!s || !t) return false;
  // Short targets like "oui" / "non" — require contains
  if (t.length <= 4) return s === t || s.includes(t);
  const sWords = new Set(s.split(' ').filter(Boolean));
  const tWords = t.split(' ').filter(Boolean);
  if (tWords.length === 0) return false;
  const hits = tWords.filter(w => sWords.has(w)).length;
  return hits / tWords.length >= 0.65;
}
function getSpeechRecognition() {
  return window.SpeechRecognition || window.webkitSpeechRecognition || null;
}

function renderComprehension(story, state) {
  const sec = document.createElement('section');
  sec.className = 'section';
  sec.innerHTML = `<p class="section-eyebrow">Compréhension</p><h2 class="section-title">Vérifie ta compréhension</h2>`;
  const comp = story.comprehension;

  // 1. Three Vrai/Faux items
  if (Array.isArray(comp.trueFalse)) {
    comp.trueFalse.forEach((tf, idx) => {
      const card = document.createElement('div');
      card.className = 'comp-item';
      card.innerHTML = `
        <div class="label">Vrai ou Faux · ${idx + 1}/${comp.trueFalse.length}</div>
        <div class="question">${tf.statement}</div>
        <div class="vf-buttons">
          <button class="vf-btn" data-v="vrai">Vrai</button>
          <button class="vf-btn" data-v="faux">Faux</button>
        </div>
      `;
      card.querySelectorAll('.vf-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          card.querySelectorAll('.vf-btn').forEach(b => b.classList.remove('correct', 'wrong'));
          btn.classList.add(btn.dataset.v === tf.answer ? 'correct' : 'wrong');
          const tfState = lsGetStoryState(story.id).tfAnswers || {};
          tfState[idx] = btn.dataset.v;
          lsSetStoryState(story.id, { tfAnswers: tfState });
        });
      });
      sec.appendChild(card);
    });
  }

  // 2. Sentence ordering (drag-and-drop)
  if (Array.isArray(comp.sentenceOrder) && comp.sentenceOrder.length >= 3) {
    const ord = document.createElement('div');
    ord.className = 'comp-item';
    ord.innerHTML = `
      <div class="label">Remets dans l'ordre</div>
      <div class="order-instructions">Glisse les phrases pour les remettre dans l'ordre de l'histoire.</div>
      <ul class="order-list"></ul>
      <div style="display:flex; gap:10px; margin-top:12px;">
        <button class="btn btn-primary" data-action="check-order">Vérifier</button>
        <button class="btn btn-ghost" data-action="reshuffle">Mélanger</button>
      </div>
    `;
    const list = ord.querySelector('.order-list');
    // Shuffled copy
    const correct = comp.sentenceOrder.slice();
    let display = correct.slice();
    // Fisher-Yates that ensures at least one swap
    for (let i = display.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [display[i], display[j]] = [display[j], display[i]];
    }
    if (display.every((s, i) => s === correct[i])) {
      [display[0], display[1]] = [display[1], display[0]];
    }
    function paintList(arr) {
      list.innerHTML = '';
      arr.forEach((sentence, i) => {
        const li = document.createElement('li');
        li.className = 'order-item';
        li.draggable = true;
        li.dataset.idx = i;
        li.innerHTML = `<span class="drag-handle">⋮⋮</span><span class="order-text">${sentence}</span>`;
        list.appendChild(li);
      });
      wireDrag();
    }
    function currentSentences() {
      return Array.from(list.querySelectorAll('.order-text')).map(el => el.textContent);
    }
    let dragSrc = null;
    function wireDrag() {
      list.querySelectorAll('.order-item').forEach(item => {
        item.addEventListener('dragstart', e => { dragSrc = item; item.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
        item.addEventListener('dragend', () => { item.classList.remove('dragging'); list.querySelectorAll('.order-item').forEach(i => i.classList.remove('over')); });
        item.addEventListener('dragover', e => { e.preventDefault(); item.classList.add('over'); });
        item.addEventListener('dragleave', () => item.classList.remove('over'));
        item.addEventListener('drop', e => {
          e.preventDefault();
          if (!dragSrc || dragSrc === item) return;
          const items = Array.from(list.querySelectorAll('.order-item'));
          const fromIdx = items.indexOf(dragSrc);
          const toIdx = items.indexOf(item);
          if (fromIdx < toIdx) list.insertBefore(dragSrc, item.nextSibling);
          else list.insertBefore(dragSrc, item);
        });
        // Touch fallback (tap-then-tap to swap)
        item.addEventListener('click', () => {
          if (item.classList.contains('selected-for-swap')) {
            item.classList.remove('selected-for-swap');
            return;
          }
          const other = list.querySelector('.selected-for-swap');
          if (other) {
            // Swap text content
            const a = other.querySelector('.order-text').textContent;
            const b = item.querySelector('.order-text').textContent;
            other.querySelector('.order-text').textContent = b;
            item.querySelector('.order-text').textContent = a;
            other.classList.remove('selected-for-swap');
          } else {
            item.classList.add('selected-for-swap');
            item.style.outline = '2px dashed var(--sage)';
            setTimeout(() => { item.style.outline = ''; }, 2000);
          }
        });
      });
    }
    paintList(display);
    ord.querySelector('[data-action="check-order"]').addEventListener('click', () => {
      const items = Array.from(list.querySelectorAll('.order-item'));
      const cur = currentSentences();
      items.forEach((it, i) => {
        it.classList.remove('correct', 'wrong');
        it.classList.add(cur[i] === correct[i] ? 'correct' : 'wrong');
      });
      lsSetStoryState(story.id, { orderAttempted: true });
    });
    ord.querySelector('[data-action="reshuffle"]').addEventListener('click', () => {
      let s = correct.slice();
      for (let i = s.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [s[i], s[j]] = [s[j], s[i]];
      }
      paintList(s);
    });
    sec.appendChild(ord);
  }

  // 3. Gap-fill with word bank
  if (comp.gapFill && Array.isArray(comp.gapFill.items)) {
    const gap = document.createElement('div');
    gap.className = 'comp-item';
    gap.innerHTML = `
      <div class="label">Complète les phrases</div>
      <div class="order-instructions">Choisis le mot ou le chunk dans la banque, puis tape sur un blanc.</div>
      <div class="gap-bank"></div>
      <div class="gap-sentences"></div>
      <div style="margin-top:12px"><button class="btn btn-primary" data-action="check-gap">Vérifier</button></div>
    `;
    const bankEl = gap.querySelector('.gap-bank');
    const sentEl = gap.querySelector('.gap-sentences');
    let activeChip = null;
    comp.gapFill.bank.forEach(word => {
      const chip = document.createElement('button');
      chip.className = 'gap-chip';
      chip.textContent = word;
      chip.dataset.word = word;
      chip.addEventListener('click', () => {
        bankEl.querySelectorAll('.gap-chip').forEach(c => c.classList.remove('selected'));
        if (activeChip === chip) { activeChip = null; return; }
        chip.classList.add('selected');
        activeChip = chip;
      });
      bankEl.appendChild(chip);
    });
    comp.gapFill.items.forEach((item, idx) => {
      const line = document.createElement('div');
      line.className = 'gap-sentence';
      // Split the sentence on {{...}} placeholder
      const parts = item.sentence.split(/(\{\{.*?\}\})/);
      parts.forEach(p => {
        if (/^\{\{.*\}\}$/.test(p)) {
          const blank = document.createElement('span');
          blank.className = 'gap-blank';
          blank.textContent = '_______';
          blank.dataset.idx = idx;
          blank.dataset.answer = item.answer;
          blank.addEventListener('click', () => {
            if (!activeChip) {
              // If filled, unfill: return chip
              if (blank.classList.contains('filled')) {
                const w = blank.textContent;
                const c = bankEl.querySelector(`.gap-chip[data-word="${CSS.escape(w)}"]`);
                if (c) c.classList.remove('used');
                blank.textContent = '_______';
                blank.classList.remove('filled', 'correct', 'wrong');
              }
              return;
            }
            const w = activeChip.dataset.word;
            // If blank already filled, return its previous
            if (blank.classList.contains('filled')) {
              const prev = blank.textContent;
              const c = bankEl.querySelector(`.gap-chip[data-word="${CSS.escape(prev)}"]`);
              if (c) c.classList.remove('used');
            }
            blank.textContent = w;
            blank.classList.add('filled');
            blank.classList.remove('correct', 'wrong');
            activeChip.classList.add('used');
            activeChip.classList.remove('selected');
            activeChip = null;
          });
          line.appendChild(blank);
        } else if (p) {
          line.appendChild(document.createTextNode(p));
        }
      });
      sentEl.appendChild(line);
    });
    gap.querySelector('[data-action="check-gap"]').addEventListener('click', () => {
      sentEl.querySelectorAll('.gap-blank').forEach(b => {
        if (!b.classList.contains('filled')) return;
        const ok = b.textContent.trim() === b.dataset.answer.trim();
        b.classList.add(ok ? 'correct' : 'wrong');
      });
      lsSetStoryState(story.id, { gapAttempted: true });
    });
    sec.appendChild(gap);
  }

  // 4. Scaffolded open-ended (collapsed by default)
  if (comp.openEndedScaffold || comp.openEnded) {
    const open = document.createElement('div');
    open.className = 'comp-item';
    const template = comp.openEndedScaffold?.template || comp.openEnded;
    const hint = comp.openEndedScaffold?.hint || "Écris en français.";
    open.innerHTML = `
      <details>
        <summary style="cursor:pointer; font-weight:500; color:var(--muted); font-size:0.9rem; user-select:none;">
          Pour aller plus loin — réponse libre (optionnel)
        </summary>
        <div style="margin-top:14px">
          <div class="question" style="font-style:italic">${template}</div>
          <div style="font-size:0.82rem; color:var(--muted); margin-bottom:8px">${hint}</div>
          <textarea class="open-input" placeholder="Tape ta réponse en français…">${state.openAnswer || ''}</textarea>
          <div class="open-confirm">Bien joué — réponse enregistrée.</div>
        </div>
      </details>
    `;
    const ta = open.querySelector('textarea');
    const confirm = open.querySelector('.open-confirm');
    let saveTimer;
    ta.addEventListener('input', () => {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        lsSetStoryState(story.id, { openAnswer: ta.value });
        if (ta.value.trim().length > 0) {
          confirm.classList.add('shown');
          setTimeout(() => confirm.classList.remove('shown'), 1500);
        }
      }, 400);
    });
    sec.appendChild(open);
  }

  return sec;
}

function initCanvas(story, shell) {
  const canvas = shell.querySelector('#drawing-canvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  // High-DPI canvas
  const cssW = canvas.clientWidth;
  const cssH = canvas.clientHeight;
  canvas.width = cssW * dpr;
  canvas.height = cssH * dpr;
  ctx.scale(dpr, dpr);
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, cssW, cssH);
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  let tool = "pen";
  let size = 4;
  let color = "#1a1a1a";
  let drawing = false;
  let last = null;
  let strokes = []; // array of arrays of points {x,y,size,color,tool}
  let current = null;

  // Restore saved
  const state = lsGetStoryState(story.id);
  if (state.canvasStrokes && Array.isArray(state.canvasStrokes)) {
    strokes = state.canvasStrokes;
    redraw();
  }

  function redraw() {
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, cssW, cssH);
    strokes.forEach(stroke => {
      if (stroke.length < 2) return;
      ctx.strokeStyle = stroke[0].tool === "eraser" ? "#ffffff" : stroke[0].color;
      ctx.lineWidth = stroke[0].size;
      ctx.beginPath();
      ctx.moveTo(stroke[0].x, stroke[0].y);
      for (let i = 1; i < stroke.length; i++) ctx.lineTo(stroke[i].x, stroke[i].y);
      ctx.stroke();
    });
  }

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  }
  function start(e) {
    e.preventDefault();
    drawing = true;
    last = getPos(e);
    current = [{ ...last, size, color, tool }];
  }
  function move(e) {
    if (!drawing) return;
    e.preventDefault();
    const pos = getPos(e);
    ctx.strokeStyle = tool === "eraser" ? "#ffffff" : color;
    ctx.lineWidth = size;
    ctx.beginPath();
    ctx.moveTo(last.x, last.y);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    last = pos;
    current.push({ ...pos, size, color, tool });
  }
  function end() {
    if (!drawing) return;
    drawing = false;
    if (current && current.length > 1) {
      strokes.push(current);
      lsSetStoryState(story.id, { canvasStrokes: strokes });
    }
    current = null;
  }
  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  window.addEventListener('mouseup', end);
  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove', move, { passive: false });
  canvas.addEventListener('touchend', end);

  // Tool toolbar
  shell.querySelectorAll('[data-tool]').forEach(b => {
    b.addEventListener('click', () => {
      shell.querySelectorAll('[data-tool]').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      tool = b.dataset.tool;
    });
  });
  shell.querySelectorAll('[data-size]').forEach(b => {
    b.addEventListener('click', () => {
      shell.querySelectorAll('[data-size]').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      size = parseInt(b.dataset.size, 10);
    });
  });
  shell.querySelectorAll('.color-swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      shell.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
      sw.classList.add('active');
      color = sw.dataset.color;
      tool = "pen";
      shell.querySelectorAll('[data-tool]').forEach(x => x.classList.toggle('active', x.dataset.tool === 'pen'));
    });
  });
  shell.querySelector('[data-action="undo"]').addEventListener('click', () => {
    strokes.pop();
    lsSetStoryState(story.id, { canvasStrokes: strokes });
    redraw();
  });
  shell.querySelector('[data-action="clear"]').addEventListener('click', () => {
    if (!confirm('Effacer tout le dessin ?')) return;
    strokes = [];
    lsSetStoryState(story.id, { canvasStrokes: [] });
    redraw();
  });

  // Submit
  shell.querySelector('#submit-drawing').addEventListener('click', async () => {
    const dataUrl = canvas.toDataURL('image/png');
    // Cap at ~500KB by re-rendering smaller if needed
    let finalUrl = dataUrl;
    if (dataUrl.length > 500000) {
      const tmp = document.createElement('canvas');
      const scale = Math.sqrt(450000 / dataUrl.length);
      tmp.width = Math.floor(canvas.width * scale);
      tmp.height = Math.floor(canvas.height * scale);
      const tctx = tmp.getContext('2d');
      tctx.drawImage(canvas, 0, 0, tmp.width, tmp.height);
      finalUrl = tmp.toDataURL('image/png');
    }
    await submitDrawing(story, finalUrl);
  });
}

      const entries = (GLOSSARY_CLUSTERS[cluster] || []).filter(e => {
        if (glossaryFilters.story !== 'all' && e.story !== glossaryFilters.story) return false;

          if (!e.en.toLowerCase().includes(q) && !e.fr.toLowerCase().includes(q)) return false;
        }

      });

      sec.className = 'glossary-cluster';

      });

      out.innerHTML = `<div class="glossary-empty">Aucun résultat. Essaie un autre mot-clé.</div>`;
    }
  };
  renderResults();
  document.getElementById('g-search').addEventListener('input', e => {
    glossaryFilters.search = e.target.value;
    renderResults();
  });
  document.getElementById('g-cluster').addEventListener('change', e => {
    glossaryFilters.cluster = e.target.value;
    renderResults();
  });
  document.getElementById('g-story').addEventListener('change', e => {
    glossaryFilters.story = e.target.value;
    renderResults();
  });
}

let firebaseReady = false;
let firebaseApp = null;
let firestore = null;
let firebaseUser = null;
let unsubGallery = null;
let localDrawings = []; // localStorage fallback

async function initFirebase() {
  const valid = Object.values(FIREBASE_CONFIG).every(v => v && v !== "REPLACE_ME");
  if (!valid) {
    firebaseReady = false;
    return;
  }
  try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js");
    const { getAuth, signInAnonymously, onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js");
    const { getFirestore } = await import("https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js");
    firebaseApp = initializeApp(FIREBASE_CONFIG);
    firestore = getFirestore(firebaseApp);
    const auth = getAuth(firebaseApp);
    await signInAnonymously(auth);
    await new Promise(resolve => {
      onAuthStateChanged(auth, u => { if (u) { firebaseUser = u; resolve(); } });
    });
    firebaseReady = true;
  } catch (e) {
    console.warn("Firebase init failed, using local mode:", e);
    firebaseReady = false;
  }
}

async function submitDrawing(story, dataUrl) {
  const data = lsGet();
  const entry = {
    id: 'local_' + Date.now(),
    classCode: data.classCode || '',
    storyId: story.id,
    studentPseudonym: data.pseudonym || 'Anonyme',
    imageDataUrl: dataUrl,
    prompt: story.drawingPrompt,
    createdAt: Date.now()
  };
  // Always store locally
  localDrawings = (data.localDrawings || []).concat([entry]);
  lsPatch({ localDrawings });
  if (firebaseReady && firestore) {
    try {
      const { collection, addDoc, serverTimestamp } = await import("https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js");
      await addDoc(collection(firestore, "drawings"), {
        classCode: entry.classCode,
        storyId: entry.storyId,
        studentPseudonym: entry.studentPseudonym,
        imageDataUrl: entry.imageDataUrl,
        prompt: entry.prompt,
        createdAt: serverTimestamp()
      });
    } catch (e) {
      console.warn("Firebase upload failed, kept locally:", e);
    }
  }
  showView('gallery', null);
}

let galleryFilter = 'all';

let galleryPage = 1;
const GALLERY_PAGE_SIZE = 24;

  const wrap = document.createElement('div');

    paintGallery();

  }

  // Real-time Firestore listener scoped to class code
  attachFirestoreListener();

async function attachFirestoreListener() {
  if (unsubGallery) unsubGallery();
  const data = lsGet();
  const code = data.classCode || '';
  try {
    const { collection, query, where, orderBy, onSnapshot } = await import("https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js");
    const q = query(
      collection(firestore, "drawings"),
      where("classCode", "==", code),
      orderBy("createdAt", "desc")
    );
    unsubGallery = onSnapshot(q, (snap) => {
      galleryDrawings = snap.docs.map(d => {
        const v = d.data();
        return {
          id: d.id,
          classCode: v.classCode,
          storyId: v.storyId,
          studentPseudonym: v.studentPseudonym,
          imageDataUrl: v.imageDataUrl,
          prompt: v.prompt,
          createdAt: v.createdAt && v.createdAt.toMillis ? v.createdAt.toMillis() : Date.now()
        };
      });
      paintGallery();
    }, err => {
      console.warn("Gallery listener error:", err);
      // Fall back to local
      galleryDrawings = (lsGet().localDrawings || []).slice().reverse();
      paintGallery();
    });
  } catch (e) {
    console.warn(e);
    galleryDrawings = (lsGet().localDrawings || []).slice().reverse();
    paintGallery();
  }
}

function paintGallery() {
  const mount = document.getElementById('gallery-mount');
  if (!mount) return;
  const filtered = galleryFilter === 'all'
    ? galleryDrawings
    : galleryDrawings.filter(d => d.storyId === galleryFilter);
  if (!filtered.length) {
    mount.innerHTML = `<div class="gallery-empty">Aucun dessin pour l'instant. Sois le premier&nbsp;!</div>`;
    return;
  }
  const visible = filtered.slice(0, galleryPage * GALLERY_PAGE_SIZE);
  const grid = document.createElement('div');
  grid.className = 'gallery-grid';
  visible.forEach(d => {
    const card = document.createElement('div');
    card.className = 'gallery-card';
    const story = STORIES.find(s => s.id === d.storyId);
    card.innerHTML = `
      <img src="${d.imageDataUrl}" alt="">
      <div class="meta">
        <div class="pseudo">${d.studentPseudonym}</div>
        <div class="story-name">${story ? story.title : d.storyId}</div>
      </div>
    `;
    card.addEventListener('click', () => openLightbox(d));
    grid.appendChild(card);
  });
  mount.innerHTML = '';
  mount.appendChild(grid);
  if (filtered.length > visible.length) {
    const more = document.createElement('button');
    more.className = 'btn btn-secondary gallery-load-more';
    more.textContent = "Voir plus";
    more.addEventListener('click', () => { galleryPage++; paintGallery(); });
    mount.appendChild(more);
  }
}

// ============================================================
// URL routes:
//   ?mode=game-teacher&class=CODE   → teacher controls
//   ?mode=game-student&class=CODE   → student joins
//
// Firestore schema (under game_sessions/{sessionId}):
//   { classCode, currentSentence, phase, sentences:[], currentIdx,
//     createdAt, updatedAt }
//   subcollection game_drawings: { studentPseudonym, imageDataUrl, sentenceIdx, createdAt }

function initGameCanvas(shell, sessionId, pseudo, sentenceIdx, onSubmitted) {
  const canvas = shell.querySelector('#drawing-canvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth, cssH = canvas.clientHeight;
  canvas.width = cssW * dpr; canvas.height = cssH * dpr;
  ctx.scale(dpr, dpr);
  ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, cssW, cssH);
  ctx.lineCap = "round"; ctx.lineJoin = "round";

  let tool = "pen", size = 4, color = "#1a1a1a";
  let drawing = false, last = null;
  let lineStartX = 0, lineStartY = 0;
  let preLineImageData = null; // for line tool preview (synchronous restore)

  // Snapshot-based undo. Each entry is a PNG data URL.
  const undoStack = [];
  const MAX_UNDO = 12;
  function pushUndo() {
    try {
      undoStack.push(canvas.toDataURL('image/png'));
      while (undoStack.length > MAX_UNDO) undoStack.shift();
    } catch (e) { console.warn('snapshot failed', e); }
  }
  function undo() {
    if (undoStack.length === 0) return;
    const url = undoStack.pop();
    const img = new Image();
    img.onload = () => {
      ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, cssW, cssH);
      ctx.drawImage(img, 0, 0, cssW, cssH);
    };
    img.src = url;
  }

  function pos(e) {
    const r = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - r.left, y: t.clientY - r.top };
  }

  // Iterative stack-based flood fill. Operates on raw canvas pixels.
  function floodFillAt(cssX, cssY, hexColor) {
    const w = canvas.width, h = canvas.height;
    const x0 = Math.floor(cssX * dpr), y0 = Math.floor(cssY * dpr);
    if (x0 < 0 || x0 >= w || y0 < 0 || y0 >= h) return;
    const r = parseInt(hexColor.slice(1, 3), 16);
    const g = parseInt(hexColor.slice(3, 5), 16);
    const b = parseInt(hexColor.slice(5, 7), 16);
    const imageData = ctx.getImageData(0, 0, w, h);
    const data = imageData.data;
    const startIdx = (y0 * w + x0) * 4;
    const tR = data[startIdx], tG = data[startIdx + 1], tB = data[startIdx + 2];
    if (r === tR && g === tG && b === tB) return; // nothing to do
    const tol = 16; // tolerance for antialiased edges
    const stack = [x0, y0];
    while (stack.length > 0) {
      const y = stack.pop();
      const x = stack.pop();
      if (x < 0 || x >= w || y < 0 || y >= h) continue;
      const idx = (y * w + x) * 4;
      if (Math.abs(data[idx] - tR) > tol || Math.abs(data[idx + 1] - tG) > tol || Math.abs(data[idx + 2] - tB) > tol) continue;
      data[idx] = r; data[idx + 1] = g; data[idx + 2] = b; data[idx + 3] = 255;
      stack.push(x + 1, y, x - 1, y, x, y + 1, x, y - 1);
    }
    ctx.putImageData(imageData, 0, 0);
  }

  function start(x, y) {
    if (tool === 'fill') {
      pushUndo();
      floodFillAt(x, y, color);
      return; // fill is one-shot — no drag state
    }
    pushUndo();
    drawing = true;
    last = { x, y };
    if (tool === 'line') {
      lineStartX = x; lineStartY = y;
      preLineImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    } else {
      // Pen / eraser — start a stroke and draw an initial dot
      ctx.strokeStyle = tool === 'eraser' ? '#ffffff' : color;
      ctx.lineWidth = size;
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + 0.01, y); ctx.stroke();
    }
  }
  function move(x, y) {
    if (!drawing) return;
    if (tool === 'line') {
      if (!preLineImageData) return;
      ctx.putImageData(preLineImageData, 0, 0); // synchronous restore
      ctx.strokeStyle = color; ctx.lineWidth = size;
      ctx.beginPath(); ctx.moveTo(lineStartX, lineStartY); ctx.lineTo(x, y); ctx.stroke();
    } else {
      ctx.strokeStyle = tool === 'eraser' ? '#ffffff' : color;
      ctx.lineWidth = size;
      ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(x, y); ctx.stroke();
    }
    last = { x, y };
  }
  function end() {
    if (!drawing) return;
    drawing = false;
    if (tool === 'line') {
      preLineImageData = null;
      // Final line was already drawn by the last move() call.
    }
  }

  canvas.addEventListener('mousedown', e => { e.preventDefault(); const p = pos(e); start(p.x, p.y); });
  canvas.addEventListener('mousemove', e => { if (!drawing) return; e.preventDefault(); const p = pos(e); move(p.x, p.y); });
  window.addEventListener('mouseup', () => end());
  canvas.addEventListener('touchstart', e => { e.preventDefault(); const p = pos(e); start(p.x, p.y); }, { passive: false });
  canvas.addEventListener('touchmove', e => { if (!drawing) return; e.preventDefault(); const p = pos(e); move(p.x, p.y); }, { passive: false });
  canvas.addEventListener('touchend', () => end());

  shell.querySelectorAll('[data-tool]').forEach(b => b.addEventListener('click', () => {
    shell.querySelectorAll('[data-tool]').forEach(x => x.classList.remove('active'));
    b.classList.add('active'); tool = b.dataset.tool;
  }));
  shell.querySelectorAll('[data-size]').forEach(b => b.addEventListener('click', () => {
    shell.querySelectorAll('[data-size]').forEach(x => x.classList.remove('active'));
    b.classList.add('active'); size = parseInt(b.dataset.size, 10);
  }));
  shell.querySelectorAll('.color-swatch').forEach(sw => sw.addEventListener('click', () => {
    shell.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
    sw.classList.add('active'); color = sw.dataset.color;
  }));
  const customColorInput = shell.querySelector('#custom-color-input');
  if (customColorInput) customColorInput.addEventListener('input', e => {
    color = e.target.value;
    shell.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
  });

  shell.querySelector('[data-action="undo"]').addEventListener('click', () => undo());
  shell.querySelector('[data-action="clear"]').addEventListener('click', () => {
    if (!confirm("Effacer le dessin ?")) return;
    pushUndo();
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, cssW, cssH);
  });

  shell.querySelector('#submit-game-drawing').addEventListener('click', async () => {
    const submitBtn = shell.querySelector('#submit-game-drawing');
    if (submitBtn.disabled) return;          // Idempotency guard
    submitBtn.disabled = true;
    const status = shell.querySelector('#submit-status');
    status.textContent = "Envoi en cours…";

    // Iteratively shrink the PNG until clearly under 500KB (Firestore rule allows up to ~600KB).
    let dataUrl = canvas.toDataURL('image/png');
    let attempts = 0;
    while (dataUrl.length > 500000 && attempts < 5) {
      const tmp = document.createElement('canvas');
      const scale = Math.sqrt(400000 / dataUrl.length);
      tmp.width = Math.max(200, Math.floor(canvas.width * scale));
      tmp.height = Math.max(150, Math.floor(canvas.height * scale));
      const tctx = tmp.getContext('2d');
      tctx.fillStyle = '#ffffff';
      tctx.fillRect(0, 0, tmp.width, tmp.height);
      tctx.drawImage(canvas, 0, 0, tmp.width, tmp.height);
      dataUrl = tmp.toDataURL('image/png');
      attempts++;
    }
    // Final fallback: if still too big, drop to JPEG at fixed small dimensions
    if (dataUrl.length > 500000) {
      const tmp = document.createElement('canvas');
      tmp.width = 400; tmp.height = 300;
      const tctx = tmp.getContext('2d');
      tctx.fillStyle = '#ffffff';
      tctx.fillRect(0, 0, 400, 300);
      tctx.drawImage(canvas, 0, 0, 400, 300);
      dataUrl = tmp.toDataURL('image/jpeg', 0.7);
    }

    async function tryWrite() {
      const fs = await getFirestoreApi();
      return fs.addDoc(fs.collection(firestore, `game_sessions/${sessionId}/game_drawings`), {
        studentPseudonym: pseudo,
        imageDataUrl: dataUrl,
        sentenceIdx,
        createdAt: fs.serverTimestamp()
      });
    }

    let lastErr = null;
    try {
      try {
        await tryWrite();
      } catch (firstErr) {
        lastErr = firstErr;
        console.warn("first submit attempt failed, retrying in 700ms:", firstErr);
        status.textContent = "Réessai…";
        await new Promise(r => setTimeout(r, 700));
        await tryWrite();
      }
      status.textContent = "Dessin envoyé !";
      if (onSubmitted) onSubmitted();
    } catch (err) {
      lastErr = err;
      console.error("submit failed after retry", err);
      let msg;
      if (err && err.code === 'permission-denied') {
        msg = "Refusé par Firebase. Dis-le au prof.";
      } else if (err && (err.code === 'unavailable' || err.code === 'deadline-exceeded')) {
        msg = "Connexion lente. Vérifie le WiFi et réessaie.";
      } else if (dataUrl.length > 580000) {
        msg = `Dessin trop grand (${Math.round(dataUrl.length / 1024)}KB). Simplifie-le.`;
      } else {
        msg = `Erreur d'envoi (${err?.code || err?.message || 'inconnue'}). Réessaie.`;
      }
      status.textContent = msg;
      submitBtn.disabled = false;            // Re-enable so the student can retry
    }
  });
}

async function renderStudentVoting(host, sessionId, pseudo, sentenceIdx, phase, sessionData) {
  if (!host) return;

  // Compute timer-driven votingOpen state
  const voteMode = sessionData?.voteMode || 'top3';
  const isSpam = voteMode === 'spam';
  let votingOpen = (phase === 'voting');
  if (votingOpen && isSpam && sessionData?.voteStartedAt && sessionData?.voteSeconds) {
    const start = tsToMs(sessionData.voteStartedAt);
    if (start) {
      const remaining = sessionData.voteSeconds - (Date.now() - start) / 1000;
      if (remaining <= 0) votingOpen = false;
    }
  }

  // Build a render key that captures everything that requires a full rebuild.
  // Vote-driven updates do NOT change this key, so they skip rebuild and avoid scroll reset.
  const renderKey = `${sentenceIdx}:${phase}:${votingOpen ? 'open' : 'locked'}:${gameDrawings.filter(d => d.sentenceIdx === sentenceIdx).length}`;
  if (host.dataset.renderedFor === renderKey) {
    updateVotingDisplay(host, sentenceIdx, phase, sessionData, pseudo);
    return;
  }

  // Full rebuild
  host.dataset.renderedFor = renderKey;

  const drawings = gameDrawings.filter(d => d.sentenceIdx === sentenceIdx);
  const allVotesForRound = gameVotes.filter(v => v.sentenceIdx === sentenceIdx);
  const myVotes = allVotesForRound.filter(v => v.voterId === pseudo);
  const voteCounts = {};
  allVotesForRound.forEach(v => { voteCounts[v.drawingId] = (voteCounts[v.drawingId] || 0) + 1; });
  const showStars = phase === 'voting' || phase === 'results';
  const showPseudo = phase === 'results';
  const maxStars = 3;

  if (drawings.length === 0) {
    host.innerHTML = `<div class="game-panel" style="text-align:center; color:var(--muted)">Pas encore de dessins.</div>`;
    return;
  }

  const totalTaps = allVotesForRound.length;
  const heading = phase === 'voting'
    ? (isSpam
        ? `Spam vote — tape comme un fou ! (${votingOpen ? 'en cours' : 'TERMINÉ'})`
        : `Choisis tes 3 dessins préférés (${myVotes.length}/${maxStars} étoiles utilisées)`)
    : 'Résultats';

  host.innerHTML = `
    <div class="game-panel">
      <h3 style="margin-top:0" id="voting-heading">${heading}</h3>
      ${isSpam && phase !== 'results' ? `
        <div class="spam-total-banner">
          <span>⚡</span>
          <span class="total-num" id="spam-total">${totalTaps}</span>
          <span>taps cette manche !</span>
        </div>
      ` : ''}
      <div class="vote-grid ${isSpam ? 'spam-mode' : ''}"></div>
      ${isSpam && !votingOpen && phase === 'voting' ? `
        <div class="spam-locked-overlay">⏱ Temps écoulé — le professeur va révéler les résultats.</div>
      ` : ''}
    </div>
  `;
  const grid = host.querySelector('.vote-grid');
  const fs = await getFirestoreApi();

  drawings.forEach(d => {
    const isMine = d.studentPseudonym === pseudo;
    const stars = voteCounts[d.id] || 0;
    const myVotesForThis = myVotes.filter(v => v.drawingId === d.id);
    const starred = myVotesForThis.length > 0;
    const card = document.createElement('div');
    card.className = 'vote-card' + (starred ? ' starred' : '') + (showStars ? ' show-stars' : '') + (isMine ? ' own' : '') + ((!votingOpen && phase === 'voting') ? ' locked' : '');
    card.dataset.drawingId = d.id;
    card.innerHTML = `
      <img src="${d.imageDataUrl}" alt="">
      <div class="vote-star-count">★ ${stars}</div>
      <div class="pseudo-row ${showPseudo ? '' : 'hidden'}">${showPseudo ? d.studentPseudonym + (isMine ? ' (toi)' : '') : '·'}</div>
      ${isMine && phase === 'voting' ? '<div class="own-badge">Ton dessin</div>' : ''}
    `;

    if (phase === 'voting' && votingOpen && !isMine) {
      card.addEventListener('click', async () => {
        if (isSpam) {
          // Spam mode: every tap = +1, no unstar, no limit (still no self-vote)
          const countEl = card.querySelector('.vote-star-count');
          const currentDisplayed = parseInt(countEl.textContent.replace(/[^\d]/g, ''), 10) || 0;
          countEl.textContent = `★ ${currentDisplayed + 1}`;
          card.classList.remove('spam-tap');
          // Use rAF instead of forced reflow — gentler on layout and doesn't disturb scroll
          requestAnimationFrame(() => {
            requestAnimationFrame(() => card.classList.add('spam-tap'));
          });
          const totalEl = host.querySelector('#spam-total');
          if (totalEl) {
            const curTotal = parseInt(totalEl.textContent, 10) || 0;
            totalEl.textContent = curTotal + 1;
            totalEl.classList.remove('bump');
            requestAnimationFrame(() => {
              requestAnimationFrame(() => totalEl.classList.add('bump'));
            });
            setTimeout(() => totalEl.classList.remove('bump'), 200);
          }
          try {
            await fs.addDoc(fs.collection(firestore, `game_sessions/${sessionId}/votes`), {
              voterId: pseudo,
              drawingId: d.id,
              sentenceIdx,
              createdAt: fs.serverTimestamp()
            });
          } catch (err) {
            console.warn("vote write failed", err);
            // Roll back optimistic UI
            countEl.textContent = `★ ${currentDisplayed}`;
            if (totalEl) totalEl.textContent = parseInt(totalEl.textContent, 10) - 1;
          }
        } else {
          // Top 3 mode — no self-vote
          if (starred) {
            try { await fs.deleteDoc(fs.doc(firestore, `game_sessions/${sessionId}/votes/${myVotesForThis[0].id}`)); }
            catch (err) { console.warn("unstar failed", err); }
            return;
          }
          // Re-check count from latest data, not closure-captured value
          const currentMyVotes = gameVotes.filter(v => v.sentenceIdx === sentenceIdx && v.voterId === pseudo);
          if (currentMyVotes.length >= maxStars) {
            alert(`Tu as déjà utilisé tes ${maxStars} étoiles. Retire une étoile pour en redonner une.`);
            return;
          }
          try {
            await fs.addDoc(fs.collection(firestore, `game_sessions/${sessionId}/votes`), {
              voterId: pseudo,
              drawingId: d.id,
              sentenceIdx,
              createdAt: fs.serverTimestamp()
            });
          } catch (err) { console.warn("vote write failed", err); alert("Vote non envoyé. Réessaie."); }
        }
      });
    } else if (phase === 'voting' && isMine) {
      // Visually mark own card as non-votable
      card.style.cursor = 'default';
      card.style.opacity = '0.75';
    }
    grid.appendChild(card);
  });

  // Results-phase enhancements: winner callout + cascade pseudonym reveal
  if (phase === 'results') {
    const winner = [...drawings].map(d => ({...d, stars: voteCounts[d.id] || 0}))
                                .sort((a, b) => b.stars - a.stars)[0];
    if (winner && winner.stars > 0) {
      const callout = document.createElement('div');
      callout.className = 'winner-callout';
      callout.innerHTML = `
        <h2>🏆 Gagnant de la manche</h2>
        <img src="${winner.imageDataUrl}" alt="">
        <div class="winner-info">
          ${winner.studentPseudonym}${winner.studentPseudonym === pseudo ? ' (toi !)' : ''}
          — <span class="winner-stars">★ ${winner.stars}</span>
        </div>
      `;
      host.querySelector('.game-panel').insertBefore(callout, host.querySelector('.game-panel').firstChild);
    }
    // Apply cascade reveal animation to vote-cards
    grid.querySelectorAll('.vote-card').forEach((card, i) => {
      card.classList.add('cascade-reveal');
      const pseudoRow = card.querySelector('.pseudo-row');
      if (pseudoRow) pseudoRow.style.animationDelay = `${i * 0.15}s`;
    });
  }
}

// Incremental DOM update for vote-driven snapshots. Does NOT rewrite innerHTML,
// preserving scroll position.
function updateVotingDisplay(host, sentenceIdx, phase, sessionData, pseudo) {
  if (!host) return;
  const allVotesForRound = gameVotes.filter(v => v.sentenceIdx === sentenceIdx);
  const myVotes = allVotesForRound.filter(v => v.voterId === pseudo);
  const voteCounts = {};
  allVotesForRound.forEach(v => { voteCounts[v.drawingId] = (voteCounts[v.drawingId] || 0) + 1; });
  // Update star counts and starred class on each card
  host.querySelectorAll('.vote-card').forEach(card => {
    const drawingId = card.dataset.drawingId;
    if (!drawingId) return;
    const stars = voteCounts[drawingId] || 0;
    const starEl = card.querySelector('.vote-star-count');
    if (starEl && starEl.textContent !== `★ ${stars}`) {
      starEl.textContent = `★ ${stars}`;
    }
    const isStarred = myVotes.some(v => v.drawingId === drawingId);
    card.classList.toggle('starred', isStarred);
  });
  // Update spam total (no bump animation here — we only bump on local clicks)
  const totalEl = host.querySelector('#spam-total');
  if (totalEl) {
    const total = allVotesForRound.length;
    if (totalEl.textContent !== String(total)) totalEl.textContent = total;
  }
  // Update heading for top-3 mode
  const headerEl = host.querySelector('#voting-heading');
  if (headerEl && sessionData?.voteMode !== 'spam' && phase === 'voting') {
    const maxStars = 3;
    const expected = `Choisis tes 3 dessins préférés (${myVotes.length}/${maxStars} étoiles utilisées)`;
    if (headerEl.textContent !== expected) headerEl.textContent = expected;
  }
}

// ============================================================
// Boot
// ============================================================
async function boot() {
  // Route check first: game mode runs in its own UI
  const route = parseGameRoute();
  if (route) { await bootGameMode(route); return; }

  buildSidebarStories();
  const data = lsGet();
  document.getElementById('sidebar-pseudo').textContent = data.pseudonym || '—';
  document.getElementById('sidebar-classcode').textContent = data.classCode || '—';
  if (!data.pseudonym || !data.classCode) {
    showWelcome();
  }
  const lastView = data.lastView;
  const lastStoryId = data.lastStoryId;
  if (lastView === 'glossary') showView('glossary');
  else if (lastView === 'gallery') showView('gallery');
  else if (lastView === 'story' && STORIES.find(s => s.id === lastStoryId)) showView('story', lastStoryId);
  else showView('story', STORIES[0].id);
  initFirebase();
}

boot();
</script>
